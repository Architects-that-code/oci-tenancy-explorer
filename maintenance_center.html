    <div style={{marginTop:20,background:"#fff",borderRadius:12,padding:"18px 20px",border:"1px solid #e7dfdb"}}>
      <div style={{fontWeight:800,fontSize:13,marginBottom:4,color:"#1f1b1a"}}>Strategy Reference Guide</div>
      <p style={{fontSize:11,color:"#8a7f79",margin:"0 0 14px 0"}}>Seven remediation strategies based on instance shape, workload type, and fleet topology. The strategy engine automatically classifies each scheduled instance.</p>
      {[
        {icon:"🔧",label:"Bare Metal — Self-Service Update",color:"#0891b2",when:"Bare Metal shapes (BM.*)",cost:"None — customer controls timing",why:"BM instances are self-service. The customer executes the firmware update at whatever time they choose. No Oracle-initiated reboot. No OOC risk."},
        {icon:"🛡",label:"Wait + NVMe Backup",color:"#dc2626",when:"DenseIO shapes with local NVMe storage",cost:"None — accept the ~20 min reboot window",why:"Stop/Start permanently destroys NVMe data. Only safe strategy for DenseIO. Back up NVMe before the window, accept the reboot, verify data after."},
        {icon:"⎈",label:"OKE: Drain, Kill/Replace, or Node Cycling",color:"#7c3aed",when:"OKE worker nodes (detected by name or freeform tags)",cost:"Drain: None. Kill/Replace: brief overlap. Node Cycling: brief surge overlap",why:"Four options: Cordon+Drain (wait), Kill/Replace (autoscaler, field-validated at 204 VMs), Stop/Start, or Node Cycling (OKE-native maxSurge — OKE handles everything). Scheduled hosts are closed for placement, so replacements land on clean hosts."},
        {icon:"↗",label:"FD Move (~10-Day Buffer)",color:"#2563eb",when:"Instance has peers in other fault domains within the same compartment and region",cost:"None — instance reboots during the FD change",why:"Moving to a different FD clears the maintenance event. New host gets a fresh ~10-day notification window. Peers in other FDs maintain workload availability. PROCESSING status after move is a known bug — clears to CANCELED."},
        {icon:"⟳",label:"Stop/Start (~10-Day Buffer)",color:"#d97706",when:"Instance has peers but all in the same fault domain. NOT for GPU or DenseIO shapes.",cost:"None, but OOC capacity risk — instance stranded if no capacity",why:"Stop then Start moves to a new host on your schedule. New host gets a fresh ~10-day notification window if it needs future maintenance. Original host closed for placement after stop. Do NOT use Force Reboot — stays on same host. GPU shapes: NEVER use this — extreme OOC risk, use Over-Provision instead."},
        {icon:"📦",label:"Over-Provision → Cutover",color:"#b45309",when:"Singleton instance with no peers, or GPU shapes where Stop/Start is too risky",cost:"Duplicate instance cost until cutover completes",why:"No peers means no availability during any move. Provision replacement first, validate, cut traffic, then decommission original. Also the recommended path for GPU shapes due to extreme OOC risk of Stop/Start."},
      ].map(s=>(
        <div key={s.label} style={{border:`1px solid ${s.color}22`,borderLeft:`4px solid ${s.color}`,borderRadius:10,padding:"12px 16px",marginBottom:10,background:`${s.color}04`}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <span style={{fontSize:18}}>{s.icon}</span>
            <span style={{fontWeight:800,fontSize:13,color:s.color}}>{s.label}</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"3px 12px",fontSize:11,marginLeft:26}}>
            <span style={{fontWeight:700,color:"#5f5956"}}>When:</span><span style={{color:"#5f5956",lineHeight:1.5}}>{s.when}</span>
            <span style={{fontWeight:700,color:"#5f5956"}}>Cost:</span><span style={{color:"#5f5956",lineHeight:1.5}}>{s.cost}</span>
            <span style={{fontWeight:700,color:"#5f5956"}}>Why:</span><span style={{color:"#5f5956",lineHeight:1.5}}>{s.why}</span>
          </div>
        </div>
      ))}
    </div>
  </div>);
}

// ─── Tab: Action Center ───
function TabActions({strategies, instances, isImported}){
  const[actionState,setActionState]=useState({});
  const[regionFilter,setRegionFilter]=useState("all");
  const[selected,setSelected]=useState(new Set());
  const[executing,setExecuting]=useState(false);
  const[liveMode,setLiveMode]=useState(false);
  const[showConfirm,setShowConfirm]=useState(false);
  const effectiveLive=liveMode&&!isImported;
  const eligible=strategies.filter(s=>["fd_move_buffer","stop_start"].includes(s.strategy.id));
  const regions=[...new Set(eligible.map(i=>i.Region))].sort();
  const filtered=regionFilter==="all"?eligible:eligible.filter(i=>i.Region===regionFilter);
  const fdMoves=filtered.filter(s=>s.strategy.id==="fd_move_buffer");
  const stopStarts=filtered.filter(s=>s.strategy.id==="stop_start");
  const ALL_FDS=["FAULT-DOMAIN-1","FAULT-DOMAIN-2","FAULT-DOMAIN-3"];
  const doneCount=filtered.filter(i=>actionState[i.ID]?.status==="done").length;
  const errorCount=filtered.filter(i=>actionState[i.ID]?.status==="error").length;
  const runningCount=filtered.filter(i=>actionState[i.ID]?.status==="executing").length;
  const pendingInView=filtered.filter(i=>!actionState[i.ID]||actionState[i.ID].status==="error");
  const selectedInView=filtered.filter(i=>selected.has(i.ID));
  const selectedPending=selectedInView.filter(i=>!actionState[i.ID]||actionState[i.ID].status==="error");
  const allInViewSelected=filtered.length>0&&filtered.every(i=>selected.has(i.ID));

  function getTargetFD(inst){
    const current=inst.Fault_Domain;
    const peers=instances.filter(i=>i.Region===inst.Region&&shortAD(i.Availability_Domain)===shortAD(inst.Availability_Domain)&&i.ID!==inst.ID);
    const usedFDs=new Set([current,...peers.map(p=>p.Fault_Domain)]);
    const available=ALL_FDS.filter(f=>!usedFDs.has(f));
    if(available.length>0)return available[0];
    return ALL_FDS.find(f=>f!==current)||current;
  }

  function toggleSelect(id){setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleSelectAll(){
    if(allInViewSelected){setSelected(p=>{const n=new Set(p);filtered.forEach(i=>n.delete(i.ID));return n;});}
    else{setSelected(p=>{const n=new Set(p);filtered.forEach(i=>n.add(i.ID));return n;});}
  }

  async function executeFDMove(inst){
    const targetFD=getTargetFD(inst);
    setActionState(p=>({...p,[inst.ID]:{status:"executing",msg:"Initiating FD move..."}}));
    try{
      const res=await fetch("/api/maintenance/fd-move",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({instanceId:inst.ID,targetFaultDomain:targetFD,rebootAction:"SOFTRESET"})});
      const data=await res.json();
      if(data.success){setActionState(p=>({...p,[inst.ID]:{status:"done",msg:data.message||`Moved to ${shortFD(targetFD)}`}}));}
      else{setActionState(p=>({...p,[inst.ID]:{status:"error",msg:data.error||"FD move failed"}}));}
    }catch(e){setActionState(p=>({...p,[inst.ID]:{status:"error",msg:e.message}}));}
  }

  async function executeBatch(batch){
    setExecuting(true);
    for(const inst of batch){await executeFDMove(inst);await new Promise(r=>setTimeout(r,1000));}
    setExecuting(false);
  }

  const statusColors={executing:"#d97706",done:"#16a34a",error:"#dc2626"};
  const statusBg={executing:"#fffbeb",done:"#f0fdf4",error:"#fef2f2"};
  const cbStyle={width:15,height:15,accentColor:"#c74634",cursor:"pointer"};

  return(<div>
    {showConfirm && (<div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)"}} onClick={()=>setShowConfirm(false)}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:"28px 32px",maxWidth:420,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#fef2f2,#fee2e2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚠</div>
          <div style={{fontSize:16,fontWeight:800,color:"#1f1b1a"}}>Switch to Live Mode</div>
        </div>
        <div style={{fontSize:12,color:"#5f5956",lineHeight:1.7,marginBottom:20}}>
          <div>Actions will execute real changes on OCI infrastructure.</div>
          <div style={{marginTop:6}}>Instances will be rebooted during FD moves. This cannot be undone.</div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={()=>setShowConfirm(false)} style={{padding:"8px 22px",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer",background:"#f2ebe7",color:"#5f5956",border:"none"}}>Cancel</button>
          <button onClick={()=>{setLiveMode(true);setShowConfirm(false);}} style={{padding:"8px 22px",borderRadius:10,fontSize:12,fontWeight:800,cursor:"pointer",background:"linear-gradient(135deg,#c74634,#9f3022)",color:"#fff",border:"none",boxShadow:"0 3px 10px rgba(199,70,52,0.35)"}}>Switch to Live Mode</button>
        </div>
      </div>
    </div>)}
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
      <h2 style={{...S.h2,marginBottom:0}}>Action Center</h2>
      <span style={{fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:6,letterSpacing:"0.08em",background:effectiveLive?"linear-gradient(135deg,#dc2626,#b91c1c)":"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",userSelect:"none"}}>{effectiveLive?"LIVE":"DRY RUN"}</span>
    </div>
    <p style={S.desc}>{effectiveLive
      ?"Live execution mode. Select instances and execute FD migrations. Each action calls the OCI API to move the instance and trigger a softreset."
      :"Dry-run preview of the FD migration plan. Review the planned FD relocations before switching to live execution mode."
    }</p>

    {/* Mode banner */}
    <div style={{background:effectiveLive?"linear-gradient(135deg,#fef3c7,#fde68a)":"linear-gradient(135deg,#eff6ff,#dbeafe)",border:effectiveLive?"2px solid #f59e0b":"2px solid #93c5fd",borderRadius:12,padding:"14px 18px",marginBottom:16,display:"flex",gap:10}}>
      <div style={{fontSize:22}}>{effectiveLive?"⚠":"ℹ"}</div>
      <div style={{flex:1}}>
        <div style={{fontWeight:800,fontSize:13,color:effectiveLive?"#92400e":"#1e40af"}}>
          {effectiveLive?"Live Execution — Actions modify OCI infrastructure directly":"Dry Run — No changes are being made"}
        </div>
        <div style={{fontSize:11,color:effectiveLive?"#b45309":"#3b82f6",lineHeight:1.6,marginTop:2}}>
          {effectiveLive
            ?"Each FD move triggers an instance reboot (~2-5 min). Hosts scheduled for maintenance are closed for placement — moved instances land on clean hosts. OOC capacity risk: if no capacity in the target FD, the instance is stranded in STOPPED state (NOT deleted — it still exists but cannot restart until capacity frees up). GPU and DenseIO shapes are excluded."
            :"This is a read-only preview. The target fault domain is auto-selected to avoid occupied FDs. Moving to a different FD clears the maintenance event and buys a fresh ~10-day notification window. Hosts scheduled for maintenance are closed for placement."
          }
        </div>
      </div>
    </div>

    {!isImported && !effectiveLive ? (
      <div style={{marginBottom:16}}><button onClick={()=>setShowConfirm(true)} style={{fontSize:10,fontWeight:800,color:"#fff",background:"linear-gradient(135deg,#c74634,#9f3022)",border:"none",borderRadius:8,padding:"8px 24px",cursor:"pointer",letterSpacing:"0.06em",textTransform:"uppercase",boxShadow:"0 3px 10px rgba(199,70,52,0.35)"}}>SWITCH TO LIVE MODE</button></div>
    ) : effectiveLive ? (
      <div style={{marginBottom:16}}><button onClick={()=>setLiveMode(false)} style={{fontSize:10,fontWeight:800,color:"#1e40af",background:"#fff",border:"1.5px solid #93c5fd",borderRadius:8,padding:"7px 22px",cursor:"pointer",letterSpacing:"0.06em",textTransform:"uppercase"}}>SWITCH BACK TO DRY RUN</button></div>
    ) : null}

    {/* Summary cards */}
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
      <div style={{...S.card,borderTop:"3px solid #2563eb"}}><div style={S.cL}>FD Move</div><div style={S.cV("#2563eb")}>{fdMoves.length}</div><div style={S.cS}>Peers in other FDs</div></div>
      <div style={{...S.card,borderTop:"3px solid #d97706"}}><div style={S.cL}>Stop/Start</div><div style={S.cV("#d97706")}>{stopStarts.length}</div><div style={S.cS}>Same FD peers</div></div>
      {effectiveLive&&<div style={{...S.card,borderTop:"3px solid #0891b2"}}><div style={S.cL}>Selected</div><div style={S.cV("#0891b2")}>{selectedInView.length}</div><div style={S.cS}>of {filtered.length} in view</div></div>}
      {effectiveLive&&<div style={{...S.card,borderTop:"3px solid #16a34a"}}><div style={S.cL}>Completed</div><div style={S.cV("#16a34a")}>{doneCount}</div></div>}
      {effectiveLive&&<div style={{...S.card,borderTop:"3px solid #dc2626"}}><div style={S.cL}>Errors</div><div style={S.cV("#dc2626")}>{errorCount}</div></div>}
    </div>

    {/* Region filter — always visible */}
    <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:10,fontWeight:700,color:"#8a7f79",textTransform:"uppercase",letterSpacing:"0.06em"}}>Region:</span>
        <select value={regionFilter} onChange={e=>setRegionFilter(e.target.value)} style={{fontSize:11,padding:"5px 10px",borderRadius:7,border:"1px solid #e7dfdb",background:"#fff",cursor:"pointer"}}>
          <option value="all">All Regions ({eligible.length})</option>
          {regions.map(r=><option key={r} value={r}>{r} ({eligible.filter(i=>i.Region===r).length})</option>)}
        </select>
      </div>
      <span style={{fontSize:11,color:"#8a7f79"}}>{filtered.length} instance{filtered.length!==1?"s":""}{effectiveLive?"":" · dry run"}</span>
    </div>

    {/* Empty state */}
    {filtered.length===0&&<div style={{background:"#f0fdf4",borderRadius:12,padding:"20px",textAlign:"center"}}><div style={{fontSize:14,fontWeight:700,color:"#16a34a"}}>No instances eligible for FD migration{regionFilter!=="all"?` in ${regionFilter}`:""}</div><div style={{fontSize:12,color:"#15803d",marginTop:4}}>Scheduled instances are DenseIO (NVMe risk), OKE (use drain/replace), GPU (extreme OOC), or Bare Metal (self-service).</div></div>}

    {/* Migration table */}
    {filtered.length>0&&<div style={{background:"linear-gradient(135deg,#eff6ff,#dbeafe)",border:"1.5px solid #93c5fd",borderRadius:12,padding:"14px 18px",marginBottom:12}}>
      <div style={{fontSize:12,fontWeight:800,color:"#1e3a8a",marginBottom:10}}>What You Need to Know Before an FD Move</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{background:"#fff",borderRadius:8,padding:"10px 12px",border:"1px solid #bfdbfe"}}>
          <div style={{fontSize:10,fontWeight:800,color:"#16a34a",marginBottom:4}}>Preserved — No Impact</div>
          <div style={{fontSize:10,color:"#1e40af",lineHeight:1.7}}>
            {["Private IP, public IP, and all VNIC attachments — unchanged","Boot volumes and block volumes — tied to instance, not host","Security lists, NSGs, and route tables — tied to VCN/subnet","Instance tags (freeform and defined) — preserved","Instance metadata and cloud-init config — preserved","DNS hostnames — unchanged since IP does not change","Load balancer backends — brief health check blip during reboot, auto-recovers"].map((t,i)=><div key={i} style={{display:"flex",gap:4}}><span style={{color:"#16a34a",flexShrink:0}}>✓</span><span>{t}</span></div>)}
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:8,padding:"10px 12px",border:"1px solid #bfdbfe"}}>
          <div style={{fontSize:10,fontWeight:800,color:"#dc2626",marginBottom:4}}>Risks and Temporary Impact</div>
          <div style={{fontSize:10,color:"#1e40af",lineHeight:1.7}}>
            {["~2-5 minute reboot during the FD change — instance is briefly unavailable","OOC capacity risk: if no capacity in target FD for this shape, instance is stranded in STOPPED state — NOT deleted, but cannot restart until capacity frees up. Original host is closed for placement.","A1/A2 (ARM) shapes: constrained host capacity — FD moves may fail even when capacity reports show AVAILABLE. Check per-FD availability first.","Monitoring metrics and alarms: brief gap during reboot window","Instance agent plugins (OS Management, etc.): reconnect automatically after reboot","In-guest backup agents: interrupted during reboot, resume after","Maintenance status may show PROCESSING briefly — known compute bug, clears to CANCELED"].map((t,i)=><div key={i} style={{display:"flex",gap:4}}><span style={{color:i<=2?"#dc2626":"#d97706",flexShrink:0}}>{i<=2?"✗":"⚠"}</span><span>{t}</span></div>)}
          </div>
        </div>
      </div>
      <div style={{marginTop:10,fontSize:10,color:"#1e40af",lineHeight:1.6,background:"#fff",borderRadius:8,padding:"8px 12px",border:"1px solid #bfdbfe"}}>
        <strong style={{color:"#1e3a8a"}}>Why Target FD?</strong> Maintenance is per-host, not per-FD. Changing the fault domain forces a host change. Hosts scheduled for maintenance are closed for placement, so the new host is guaranteed to have no pending maintenance. The specific target FD does not matter — what matters is leaving the current host.
      </div>
    </div>}

    {/* Action controls — right above table, SE only */}
    {filtered.length>0&&effectiveLive&&<div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center",flexWrap:"wrap",background:"#fff",border:"1px solid #e7dfdb",borderRadius:10,padding:"8px 14px"}}>
      <button onClick={toggleSelectAll} style={{padding:"5px 14px",borderRadius:8,fontSize:10,fontWeight:700,cursor:"pointer",background:allInViewSelected?"#f2ebe7":"#fff",color:"#5f5956",border:"1px solid #e7dfdb"}}>{allInViewSelected?"Deselect All":"Select All"} ({filtered.length})</button>
      {selectedPending.length>0&&<button onClick={()=>executeBatch(selectedPending)} disabled={executing} style={{padding:"6px 18px",borderRadius:8,fontSize:11,fontWeight:800,cursor:executing?"wait":"pointer",background:executing?"#d97706":"linear-gradient(180deg,#2563eb,#1d4ed8)",color:"#fff",border:"none"}}>
        {executing?`Executing (${runningCount})...`:`Execute Selected (${selectedPending.length})`}
      </button>}
      {pendingInView.length>0&&<button onClick={()=>executeBatch(pendingInView)} disabled={executing} style={{padding:"6px 18px",borderRadius:8,fontSize:11,fontWeight:800,cursor:executing?"wait":"pointer",background:executing?"#d97706":"linear-gradient(180deg,#c74634,#9f3022)",color:"#fff",border:"none"}}>
        {executing?`Executing (${runningCount})...`:`Execute All (${pendingInView.length})`}
      </button>}
      {selectedInView.length>0&&<span style={{fontSize:11,color:"#0891b2",fontWeight:700,marginLeft:"auto"}}>{selectedInView.length} selected</span>}
    </div>}

    {/* Progress bar — SE only */}
    {effectiveLive&&(doneCount>0||errorCount>0||runningCount>0)&&<div style={{marginBottom:10}}>
      <div style={{display:"flex",gap:2,height:6,borderRadius:3,overflow:"hidden",background:"#f2ebe7"}}>
        <div style={{width:`${(doneCount/Math.max(filtered.length,1))*100}%`,background:"#22c55e",borderRadius:3,transition:"width 0.3s"}}/>
        <div style={{width:`${(errorCount/Math.max(filtered.length,1))*100}%`,background:"#ef4444",borderRadius:3,transition:"width 0.3s"}}/>
        <div style={{width:`${(runningCount/Math.max(filtered.length,1))*100}%`,background:"#f59e0b",borderRadius:3,transition:"width 0.3s",animation:"pulse 2s infinite"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#8a7f79",marginTop:4}}>
        <span>{doneCount} done, {errorCount} error{errorCount!==1?"s":""}, {filtered.length-doneCount-errorCount} remaining</span>
        <span>{Math.round((doneCount/Math.max(filtered.length,1))*100)}% complete</span>
      </div>
    </div>}

    {filtered.length>0&&<div style={{overflowX:"auto",borderRadius:10,border:"1px solid #e7dfdb"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
        <thead><tr style={{background:"#f8f6f4"}}>
          {effectiveLive&&<th style={{padding:"8px 6px 8px 10px",width:28,borderBottom:"1px solid #e7dfdb"}}><input type="checkbox" checked={allInViewSelected} onChange={toggleSelectAll} style={cbStyle}/></th>}
          {["Instance","Shape","Region","AD","Current FD","Target FD","Window (UTC)","Strategy","Status",effectiveLive?"Action":""].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,color:"#5f5956",fontSize:10,borderBottom:"1px solid #e7dfdb"}}>{h}</th>)}
        </tr></thead>
        <tbody>
          {filtered.map((inst,i)=>{
            const tgt=getTargetFD(inst);const st=actionState[inst.ID];const stColor=st?statusColors[st.status]:"#5f5956";const isSel=selected.has(inst.ID);
            return(<tr key={inst.ID} className={isSel&&effectiveLive&&(!st||st.status==="error")?"mc-row-sel":"mc-row"} onClick={effectiveLive&&!executing&&(!st||st.status==="error")?()=>toggleSelect(inst.ID):undefined} style={{borderBottom:i<filtered.length-1?"1px solid #f2ebe7":"none",background:st?statusBg[st.status]:isSel&&effectiveLive?"#f0f7ff":"transparent",cursor:effectiveLive&&(!st||st.status==="error")?"pointer":"default",transition:"background 0.15s"}}>
              {effectiveLive&&<td style={{padding:"8px 6px 8px 10px",width:28}} onClick={e=>e.stopPropagation()}>{(!st||st.status==="error")?<input type="checkbox" checked={isSel} onChange={()=>toggleSelect(inst.ID)} style={cbStyle}/>:null}</td>}
              <td style={{padding:"8px 10px"}}><div style={{fontWeight:700}}>{inst.Display_Name}</div>{st&&st.msg&&<div style={{fontSize:9,color:stColor,marginTop:2,maxWidth:220,lineHeight:1.3}}>{st.msg}</div>}</td>
              <td style={{padding:"8px 10px",color:"#5f5956"}}>{inst.Shape}</td>
              <td style={{padding:"8px 10px",color:"#5f5956"}}>{inst.Region}</td>
              <td style={{padding:"8px 10px",color:"#5f5956"}}>{shortAD(inst.Availability_Domain)}</td>
              <td style={{padding:"8px 10px",fontWeight:700,color:"#dc2626"}}>{shortFD(inst.Fault_Domain)}</td>
              <td style={{padding:"8px 10px",fontWeight:700,color:"#16a34a"}}>{shortFD(tgt)}</td>
              <td style={{padding:"8px 10px",color:"#5f5956"}}>{inst.Maintenance_UTC||"TBD"}</td>
              <td style={{padding:"8px 10px"}}><span style={{fontSize:10,fontWeight:700,color:inst.strategy.color}}>{inst.strategy.icon} {inst.strategy.short||inst.strategy.label.split("(")[0].trim()}</span></td>
              <td style={{padding:"8px 10px"}}>{st?<span style={{fontSize:10,fontWeight:700,color:stColor}}>{st.status==="executing"?"⏳ Running...":st.status==="done"?"✓ Done":"✗ Error"}</span>:<span style={{fontSize:10,fontWeight:600,color:effectiveLive?"#8a7f79":"#3b82f6"}}>{effectiveLive?"Ready":"Planned"}</span>}</td>
              {effectiveLive&&<td style={{padding:"8px 10px"}} onClick={e=>e.stopPropagation()}>{(!st||st.status==="error")&&!executing?<button onClick={()=>executeFDMove(inst)} style={{padding:"4px 12px",borderRadius:6,fontSize:10,fontWeight:700,cursor:"pointer",background:"#c74634",color:"#fff",border:"none"}}>Execute</button>:null}</td>}
            </tr>);
          })}
        </tbody>
      </table>
    </div>}

    {/* Post-execution note */}
    {effectiveLive&&doneCount>0&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:10,padding:"10px 14px",marginTop:10,display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:14}}>✓</span>
      <div style={{fontSize:11,color:"#166534",lineHeight:1.5}}>
        <strong>{doneCount} instance{doneCount!==1?"s":""} moved successfully.</strong> Instances remain in this list until the next data refresh. Click <strong>Refresh Data</strong> at the top of the page to update fleet data — moved instances should show new fault domains and cleared maintenance status. Maintenance status may briefly show PROCESSING before clearing to CANCELED.
      </div>

            ) : (
              <span style={{padding:"8px 18px",borderRadius:12,fontSize:10,fontWeight:900,textTransform:"uppercase",letterSpacing:"0.12em",background:"#eff6ff",color:"#2563eb",border:"1.5px solid #93c5fd"}}>Read-Only</span>
            )}
          </div>
          <p style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",color:isImported?"#2563eb":"#94a3b8",margin:0}}>{isImported?`Viewing: ${activeCustomer}`:`Refreshed: ${genLabel}`}</p>
        </div>
      </div>

      {/* ═══ Navigation Tab Bar — Fleet View + Maintenance Center + Action Center (SE) ═══ */}
      <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:"0.35rem",padding:"0.35rem",border:"1px solid #d7d2cd",borderRadius:14,background:"rgba(255,255,255,0.92)",boxShadow:"0 1px 2px rgba(22,20,18,0.04)",marginBottom:16}}>
        <span onClick={()=>{sessionStorage.setItem('__autoEnterFleet','1');window.location.href=activeCustomer?'./index.html?customer='+encodeURIComponent(activeCustomer):'./index.html';}} style={{border:"1px solid transparent",background:"transparent",color:"#57514d",textTransform:"none",letterSpacing:"0.01em",fontWeight:700,padding:"7px 16px",borderRadius:10,fontSize:12,textDecoration:"none",cursor:"pointer"}}>Fleet View</span>
        <span onClick={()=>{if(activeTab==="actions"){setTab("gaps");history.replaceState(null,"","#");}}} style={{borderColor:activeTab!=="actions"?"#c6c0bb":"transparent",color:activeTab!=="actions"?"#1b1816":"#57514d",background:activeTab!=="actions"?"#fff":"transparent",boxShadow:activeTab!=="actions"?"0 1px 2px rgba(22,20,18,0.06), inset 0 -2px 0 #c74634":"none",border:`1px solid ${activeTab!=="actions"?"#c6c0bb":"transparent"}`,fontWeight:700,padding:"7px 16px",borderRadius:10,fontSize:12,cursor:activeTab==="actions"?"pointer":"default"}}>Maintenance Center</span>
        <span onClick={()=>{setTab("actions");history.replaceState(null,"","#actions");}} style={{borderColor:activeTab==="actions"?"#c6c0bb":"transparent",color:activeTab==="actions"?"#1b1816":"#57514d",background:activeTab==="actions"?"#fff":"transparent",boxShadow:activeTab==="actions"?"0 1px 2px rgba(22,20,18,0.06), inset 0 -2px 0 #c74634":"none",border:`1px solid ${activeTab==="actions"?"#c6c0bb":"transparent"}`,fontWeight:700,padding:"7px 16px",borderRadius:10,fontSize:12,cursor:"pointer"}}>Action Center</span>
      </div>

      {/* ═══ Maintenance Center Content (hidden when Action Center is active) ═══ */}
      {activeTab!=="actions"&&<React.Fragment>

      {/* DenseIO + DR Warning Banners */}
      {denseSched.length>0&&(
        <div style={{background:"linear-gradient(135deg,#fef2f2,#fee2e2)",border:"2px solid #f87171",borderRadius:12,padding:"14px 18px",marginBottom:12,display:"flex",gap:10}}>
          <div style={{fontSize:22}}>⚠</div>
          <div>
            <div style={{fontWeight:800,fontSize:13,color:"#991b1b"}}>{denseSched.length} DenseIO Instance{denseSched.length!==1?"s":""} — Back Up NVMe Now. Do NOT Stop/Start.</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:4}}>{denseSched.map(i=><span key={i.ID} style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:"#fff",border:"1px solid #fca5a5",color:"#991b1b",fontWeight:700}}>{i.Display_Name} — {fD(pD(i.Maintenance_UTC))}</span>)}</div>
          </div>
        </div>
      )}
      {gaps.some(g=>g.type==="dr_overlap")&&(
        <div style={{background:"linear-gradient(135deg,#fef2f2,#fce7f3)",border:"2px solid #f472b6",borderRadius:12,padding:"14px 18px",marginBottom:12,display:"flex",gap:10}}>
          <div style={{fontSize:22}}>🌐</div>
          <div>
            <div style={{fontWeight:800,fontSize:13,color:"#9d174d"}}>DR Region Overlap: Primary and DR Both Have Scheduled Maintenance</div>
            <div style={{fontSize:11,color:"#be185d",lineHeight:1.5}}>Multiple regions are patched simultaneously. Failing over to a DR region does NOT guarantee avoidance. Plan for concurrent impact.</div>
          </div>
        </div>
      )}

      {/* Summary Cards */}
      <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:18}}>
        <div style={S.card}><div style={S.cL}>Total</div><div style={S.cV()}>{instances.length}</div><div style={S.cS}>{regions.length} subscribed regions</div></div>
        <div style={S.card}><div style={S.cL}>Scheduled</div><div style={S.cV("#d97706")}>{scheduled.length}</div><div style={S.cS}>{scheduled.length?`Next: ${fD(strategies[0]?._date)}`:"None pending"}</div></div>
        <div style={S.card}><div style={S.cL}>Completed</div><div style={S.cV("#16a34a")}>{completed.length}</div></div>
        <div style={S.card}><div style={S.cL}>Clear</div><div style={S.cV("#64748b")}>{notSched.length}</div></div>
        <div style={S.card}><div style={S.cL}>Findings</div><div style={S.cV(gaps.some(g=>g.severity==="critical")?"#dc2626":"#d97706")}>{gaps.length}</div><div style={S.cS}>{gaps.filter(g=>g.severity==="critical").length} critical</div></div>
        <div style={S.card}><div style={S.cL}>Signal Changes</div><div style={S.cV("#c74634")}>{changed.length}</div></div>
      </div>

      {/* Content Tabs + Region Filter */}
      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:16,flexWrap:"wrap"}}>
        {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{
          padding:"6px 14px",borderRadius:9,fontSize:10,fontWeight:800,letterSpacing:"0.06em",textTransform:"uppercase",cursor:"pointer",border:"1.5px solid",transition:"all 0.15s",
          background:activeTab===t.id?"#c74634":"#fff",color:activeTab===t.id?"#fff":"#5f5956",borderColor:activeTab===t.id?"#c74634":"#e7dfdb"
        }}>{t.label}{t.badge&&<span style={{marginLeft:4,fontSize:8,fontWeight:800,background:activeTab===t.id?"rgba(255,255,255,0.25)":"#fef3c7",color:activeTab===t.id?"#fff":"#92400e",padding:"1px 5px",borderRadius:3}}>{t.badge}</span>}</button>))}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5}}>
          <span style={{fontSize:9,fontWeight:700,color:"#8a7f79",textTransform:"uppercase",letterSpacing:"0.06em"}}>Region:</span>
          <select value={filterRegion} onChange={e=>setFilterRegion(e.target.value)} style={{fontSize:11,padding:"4px 8px",borderRadius:7,border:"1px solid #e7dfdb",background:"#fff",cursor:"pointer"}}>
            <option value="all">All ({regions.length})</option>{regions.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        </div>
      </div>

      </React.Fragment>}

      {/* SE Mode Banner — hidden on Action Center (has its own LIVE/DRY RUN) */}
      {seMode&&activeTab!=="actions"&&<div style={{background:"linear-gradient(135deg,#fdf1ef,#fce7f3)",border:"1.5px solid #e8a398",borderRadius:10,padding:"8px 16px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:8,height:8,borderRadius:"50%",background:"#c74634",animation:"pulse 2s infinite"}}/>
          <span style={{fontSize:11,fontWeight:700,color:"#c74634"}}>SE Mode Active</span>
          <span style={{fontSize:11,color:"#9f3022"}}>— Strategy Picker, OKE Playbook, and Cost Impact tabs are now visible. Field intelligence and detailed remediation enabled.</span>
        </div>
        <span style={{fontSize:10,color:"#b0a8a2"}}>Press Esc to deactivate</span>
      </div>}

      {/* Content */}
      <div style={S.panel}>
        {activeTab==="strategy"&&<TabStrategy strategies={strategies}/>}
        {activeTab==="heatmap"&&<TabHeatmap heatmap={filteredHeatmap} subscribedRegions={regions} filterRegion={filterRegion} regionDetails={regionDetails}/>}
        {activeTab==="timeline"&&<TabTimeline timeline={timeline} timelineRange={timelineRange}/>}
        {activeTab==="gaps"&&<TabGaps gaps={gaps} seMode={seMode}/>}
        {activeTab==="oke"&&<TabOKE okeInstances={okeSched}/>}
        {activeTab==="cost"&&<TabCost strategies={strategies} scheduled={scheduled}/>}
        {activeTab==="actions"&&<TabActions strategies={strategies} instances={instances} isImported={!!activeCustomer}/>}
        {activeTab==="export"&&<TabExport analysis={analysis} seMode={seMode}/>}
      </div>

      <div style={{marginTop:16,display:"flex",justifyContent:"space-between",fontSize:10,color:"#b0a8a2"}}>
        <span>OCI Tenancy Explorer — Maintenance Center</span>
        <span>{tenancyName} · {instances.length} instances · {scheduled.length} scheduled · {gaps.length} findings{activeCustomer?" · Imported snapshot":" · Auto-refreshes every 5 min"}</span>
      </div>
    </div>
  );
}

// ── Live Boot: collect from OCI, show progress, user decides on errors ──
(async () => {
  const bootStatus = document.getElementById('mc-boot-status');
  const bootRegions = document.getElementById('mc-boot-regions');
  const bootLog = document.getElementById('mc-boot-log');
  const setStatus = (msg) => { if (bootStatus) bootStatus.textContent = msg; };
  const setLog = (msg) => { if (bootLog) bootLog.innerHTML = msg; };

  // Shared: render the app from window.__FLEET_DATA
  function renderApp() {
    document.getElementById('mc-boot')?.remove();
    ReactDOM.render(React.createElement(MaintenanceCenter), document.getElementById('root'));
  }

  // Shared: try loading existing fleet_data.json from disk as fallback
  async function tryLoadExisting() {
    try {
      const res = await fetch('./fleet_data.json', { cache: 'no-store' });
      if (!res.ok) return false;
      window.__FLEET_DATA = await res.json();
      return true;
    } catch { return false; }
  }

  // Shared: show file upload option on boot screen
  function showFileUpload(reason) {
    setStatus(reason);
    const uploadDiv = document.createElement('div');
    uploadDiv.style.cssText = 'margin-top:20px;';
    uploadDiv.innerHTML = '<label style="padding:10px 24px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:#2563eb;color:#fff;border:none;display:inline-block">Load fleet_data.json<input type="file" accept=".json" style="display:none"/></label><div style="font-size:10px;color:#8a7f79;margin-top:8px">Load a fleet_data.json file to review offline. No OCI credentials required.</div>';
    uploadDiv.querySelector('input').addEventListener('change', function(e) {
      const f = e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          window.__FLEET_DATA = JSON.parse(ev.target.result);
          renderApp();
        } catch(err) { setLog('Failed to parse JSON: ' + err.message); }
      };
      reader.readAsText(f);
    });
    bootLog.parentNode.insertBefore(uploadDiv, bootLog);
  }

  const regionColors = { queued:'#cbd5e1', running:'#f59e0b', completed:'#22c55e', failed:'#ef4444' };
  function renderRegionProgress(regions) {
    if (!bootRegions || !regions) return;
    bootRegions.innerHTML = regions.map(r => {
      const color = regionColors[r.status] || '#cbd5e1';
      const phase = r.status === 'running' ? r.phase || 'Working' : r.status;
      const count = r.instanceCount ? ` (${r.instanceCount})` : '';
      return `<div style="padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;border:1px solid ${color};color:${r.status==='completed'?'#166534':r.status==='running'?'#92400e':'#64748b'};background:${r.status==='completed'?'#dcfce7':r.status==='running'?'#fef3c7':'#f8fafc'}">${r.name}<br/><span style="font-weight:400">${phase}${count}</span></div>`;
    }).join('');
  }

  // Step 0: Check for customer URL param or sessionStorage — skip collection, load imported data
  const urlCustomer = new URLSearchParams(window.location.search).get('customer') || sessionStorage.getItem('__activeCustomer') || '';
  if (urlCustomer) {
    setStatus('Loading imported customer: ' + urlCustomer + '...');
    try {
      const r = await fetch('/api/customers/load?name=' + encodeURIComponent(urlCustomer));
      const bundle = await r.json();
      if (bundle.fleet_data) {
        window.__FLEET_DATA = bundle.fleet_data;
        window.__ACTIVE_CUSTOMER = urlCustomer;
        sessionStorage.setItem('__activeCustomer', urlCustomer);
        renderApp();
        return;
      }
    } catch(e) {}
    showFileUpload('Could not load customer "' + urlCustomer + '". Load data manually:');
    return;
  }

  // Step 1: Trigger live collection
  setStatus('Starting fleet data collection across all regions...');
  const isActionsMode = window.location.hash === '#actions';
  if (isActionsMode) setStatus('Loading Action Center — collecting fleet data...');
  try {
    const triggerRes = await fetch('/api/refresh', { method: 'POST' });
    const triggerData = await triggerRes.json();
    if (!triggerData.started && !triggerData.running) {
      // Collection could not start — try loading existing data
      if (await tryLoadExisting()) { renderApp(); return; }
      showFileUpload('Collection could not start. Load data manually:');
      setLog(triggerData.message || 'Unknown error');
      return;
    }
  } catch (e) {
    // Cannot reach server — try loading existing data, otherwise show upload
    if (await tryLoadExisting()) { renderApp(); return; }
    showFileUpload('Cannot connect to portal server. Load data manually:');
    setLog(e.message);
    return;
  }

  // Step 2: Poll for progress
  let running = true;
  while (running) {
    await new Promise(r => setTimeout(r, 800));
    try {
      const statusRes = await fetch('/api/refresh/status', { cache: 'no-store' });
      const status = await statusRes.json();
      running = status.running;

      const done = status.completedRegions || 0;
      const total = status.totalRegions || 0;
      const current = (status.regions || []).find(r => r.status === 'running');
      if (total > 0) {
        setStatus(`Collecting: ${done} of ${total} regions complete${current ? ' — ' + current.name + ': ' + (current.phase || '') : ''}`);
      }
      renderRegionProgress(status.regions || []);

      if (!running && status.lastExitCode !== 0) {
        // Collection failed — try existing data
        if (await tryLoadExisting()) { renderApp(); return; }
        showFileUpload('Collection finished with errors. Load data manually:');
        setLog('Exit code ' + status.lastExitCode);
        return;
      }
    } catch (e) {
      if (await tryLoadExisting()) { renderApp(); return; }
      showFileUpload('Lost connection during collection. Load data manually:');
      setLog(e.message);
      return;
    }
  }

  // Step 3: Load the fresh data
  setStatus('Collection complete. Loading fleet data...');
  try {
    const res = await fetch('./fleet_data.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('fleet_data.json returned HTTP ' + res.status);
    window.__FLEET_DATA = await res.json();
  } catch (e) {
    setStatus('Collection succeeded but fleet_data.json could not be loaded');
    setLog(`${e.message}<br/><br/><a href="./index.html" style="color:#c74634;font-weight:700">← Back to Tenancy Explorer</a>`);
    return;
  }

  // Step 4: Render
  document.getElementById('mc-boot')?.remove();
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(MaintenanceCenter));

  // Step 5: Auto-refresh every 5 minutes (skip when viewing imported customer)
  setInterval(async () => {
    if (window.__ACTIVE_CUSTOMER) return;
    try {
      await fetch('/api/refresh', { method: 'POST' });
      let polling = true;
      while (polling) {
        await new Promise(r => setTimeout(r, 2000));
        try { const s = await (await fetch('/api/refresh/status')).json(); polling = s.running; } catch (e) { polling = false; }
      }
      const res = await fetch('./fleet_data.json', { cache: 'no-store' });
      if (res.ok) {
        window.__FLEET_DATA = await res.json();
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(MaintenanceCenter));
      }
    } catch (e) {}
  }, 5 * 60 * 1000);
})();
</script>
