<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
html{font-family:"Oracle Sans",-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;font-variant-numeric:tabular-nums;font-size:14px}
body{background:radial-gradient(circle at top right,rgba(199,70,52,0.08),transparent 22%),linear-gradient(180deg,#fbf9f8,#f7f4f2);color:#1f1b1a;margin:0;padding:0}

<body>
<div id="root"><div id="mc-boot" style="text-align:center;padding:60px 20px;font-family:'Oracle Sans',sans-serif;color:#5f5956">
  <div style="width:6px;height:28px;border-radius:3px;background:#c74634;margin:0 auto 12px"></div>
  <div id="mc-boot-title" style="font-size:18px;font-weight:800;color:#1f1b1a;margin-bottom:4px">Maintenance Center</div>
  <div id="mc-boot-status" style="font-size:12px;margin-bottom:16px">Connecting to OCI...</div>
  <div id="mc-boot-regions" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:600px;margin:0 auto"></div>
  <div id="mc-boot-log" style="font-size:10px;color:#8a7f79;margin-top:12px"></div>
</div></div>
<script>if(window.location.hash==="#actions"){var t=document.getElementById("mc-boot-title");if(t)t.textContent="Action Center";}</script>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

// ─── Utils ───
const isDense = (s) => /DenseIO/i.test(s||"");
const isBM = (s) => /^BM\./i.test(s||"");
const isGPU = (s) => /GPU/i.test(s||"");
const isARM = (s) => /\.A1\.|\.A2\./i.test(s||"");
const isOKE = (i) => { const n=(i.Display_Name||"").toLowerCase(); const t={...(i.freeformTags||{})}; return n.includes("oke-")||n.includes("np-pool")||Object.keys(t).some(k=>k.toLowerCase().includes("oke")); };
const shortAD = (a) => { const p=(a||"").split(":"); return p.length>1?p[1]:a; };
const shortFD = (f) => (f||"").replace("FAULT-DOMAIN-","FD-");
const pD = (u) => { if(!u) return null; try{return new Date(u.replace(" ","T")+"Z");}catch{return null;} };
const fD = (d) => d?d.toLocaleDateString("en-US",{month:"short",day:"numeric"}):"—";
const fT = (d) => d?d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:"UTC"})+" UTC":"";
const fDT = (d) => d?`${fD(d)} ${fT(d)}`:"—";
const isSingleton = (inst, all) => { const peers = all.filter(i=>i.Compartment_Name===inst.Compartment_Name && i.Region===inst.Region && i.ID!==inst.ID); return peers.length===0; };

// ─── Strategy Engine ───
function classifyStrategy(inst, allInstances) {
  const dense = isDense(inst.Shape), bm = isBM(inst.Shape), gpu = isGPU(inst.Shape), oke = isOKE(inst), singleton = isSingleton(inst, allInstances);
  const peers = allInstances.filter(i=>i.Compartment_Name===inst.Compartment_Name && i.Region===inst.Region && i.ID!==inst.ID);
  const hasPeersInOtherFDs = peers.some(p=>p.Fault_Domain!==inst.Fault_Domain);
  // Bare Metal — customer controls timing, self-service update
  if (bm) return { id:"bm_self_service", label:"Bare Metal — Self-Service Update", color:"#0891b2", icon:"🔧", risk:"low", summary:"Bare Metal instances are self-service. The customer executes the firmware update at whatever time they choose. No Oracle-initiated reboot.", actions:["Schedule a maintenance window at your convenience","Execute the firmware update via Console or CLI","Instance reboots with updated firmware","No OOC risk — instance stays on dedicated hardware"], selfService:true, costImpact:"none" };
  // DenseIO — NVMe at risk, no Stop/Start
  if (dense) return { id:"wait_backup", label:"Wait + NVMe Backup", color:"#dc2626", icon:"🛡", risk:"low", summary:"Back up NVMe data before the window. Accept the ~20 min reboot. Stop/Start destroys NVMe data.", actions:["Back up all local NVMe data","Validate backup integrity","Accept the scheduled maintenance window","Verify NVMe data after reboot"], selfService:false, costImpact:"none" };
  // OKE
  if (oke) return { id:"oke_drain_replace", label:"OKE: Drain or Kill/Replace", color:"#7c3aed", icon:"⎈", risk:"low", summary:"Cordon + drain before window (zero-downtime). Or terminate node and let autoscaler provision a replacement on a clean host. Or use Node Cycling with maxSurge.", actions:["Option A: Cordon → Drain → Wait for maintenance → Uncordon","Option B: Cordon → Drain → Terminate node → Autoscaler provisions replacement on clean host","Option C: Node Cycling — set maximumSurge, trigger Cycle Nodes in Console","Replacement node lands on patched or not-yet-scheduled host (scheduled hosts are closed for placement)"], selfService:true, costImpact:"Option B/C may cause brief over-provisioning during ramp" };
  // GPU — NEVER use Stop/Start, extreme OOC risk
  if (gpu && singleton) return { id:"overprovision_then_move", label:"Over-Provision → Move (GPU)", color:"#b45309", icon:"📦", risk:"high", summary:"GPU singleton. Stop/Start carries extreme OOC risk for GPU shapes — do NOT attempt. Provision a replacement first, validate, cut traffic.", actions:["Provision a replacement GPU instance in a different FD","Configure and validate the replacement","Cut traffic to the replacement","Let original take the maintenance reboot, or terminate it","⚠ GPU shapes have extreme OOC risk — do NOT use Stop/Start","⚠ Additional cost during overlap period"], selfService:true, costImpact:"temporary duplicate instance cost" };
  if (gpu && !singleton && hasPeersInOtherFDs) return { id:"fd_move_buffer", label:"FD Move (GPU — 10-Day Buffer)", color:"#2563eb", icon:"↗", risk:"medium", summary:"Move GPU to a different FD. Stop/Start carries extreme OOC risk for GPU shapes. FD Move is the safer self-service option.", actions:["Edit instance → change Fault Domain","Instance reboots onto a new host in the target FD","Maintenance event clears (may show PROCESSING briefly — known bug, clears to CANCELED)","⚠ Do NOT use Stop/Start for GPU shapes — extreme OOC capacity risk","⚠ New host may receive future maintenance notification"], selfService:true, costImpact:"none" };
  if (gpu) return { id:"overprovision_then_move", label:"Over-Provision → Move (GPU)", color:"#b45309", icon:"📦", risk:"high", summary:"GPU instance with peers but same FD. Stop/Start carries extreme OOC risk for GPU shapes. Provision a replacement first.", actions:["Provision a replacement GPU instance in a different FD","Configure and validate the replacement","Cut traffic to the replacement","Let original take the maintenance reboot, or terminate it","⚠ GPU shapes have extreme OOC risk — do NOT use Stop/Start"], selfService:true, costImpact:"temporary duplicate instance cost" };
  // Standard shapes
  if (!singleton && hasPeersInOtherFDs) return { id:"fd_move_buffer", label:"FD Move (10-Day Buffer)", color:"#2563eb", icon:"↗", risk:"medium", summary:"Move to a different FD to get a new ~10-day notification window. Workload has peers in other FDs, so availability is maintained during the move.", actions:["Edit instance → change Fault Domain","Instance reboots onto a new host in the target FD","Maintenance event clears (may show PROCESSING briefly — known bug, clears to CANCELED)","New host may receive its own maintenance notification in a future wave","⚠ OOC Risk: if no capacity in target FD/shape, instance cannot start"], selfService:true, costImpact:"none" };
  if (!singleton) return { id:"stop_start", label:"Stop/Start (~10-Day Buffer)", color:"#d97706", icon:"⟳", risk:"medium", summary:"Stop then Start to move to a new host on your schedule. New host gets a fresh ~10-day notification window if it needs future maintenance. Peers exist for availability, but monitor capacity.", actions:["Validate workload can tolerate a restart","Stop instance (Console or CLI)","Start instance — lands on new host with fresh ~10-day notification window","Verify maintenance event cleared (may show PROCESSING briefly — known bug)","⚠ OOC Risk: original host is closed; if no capacity, instance is stranded","⚠ Do NOT use Force Reboot — stays on same host"], selfService:true, costImpact:"none" };
  return { id:"overprovision_then_move", label:"Over-Provision → Move", color:"#b45309", icon:"📦", risk:"high", summary:"This is a singleton instance with no peers. Provision a replacement first, validate it, then decommission the original or let it take the maintenance hit.", actions:["Provision a new instance in a different FD (or same FD if post-maintenance)","Configure and validate the replacement","Cut traffic to the replacement (DNS, LB, etc.)","Let original instance take the maintenance reboot, or terminate it","⚠ Additional cost during overlap period","⚠ OOC Risk if provisioning in a constrained FD/shape"], selfService:true, costImpact:"temporary duplicate instance cost" };
}

// ─── Analysis ───
function analyzeFleet(data) {
  const instances = data.instances||[];
  const scheduled = instances.filter(i=>i.reboot_status==="Scheduled");
  const completed = instances.filter(i=>i.reboot_status==="Completed");
  const notSched = instances.filter(i=>i.reboot_status==="Not Scheduled");
  const denseSched = scheduled.filter(i=>isDense(i.Shape));
  const okeSched = scheduled.filter(i=>isOKE(i));
  const changed = instances.filter(i=>i.Status_Change_Signal&&!["Stable","","-"].includes(i.Status_Change_Signal));

  // Heatmap
  const heatmap = {};
  instances.forEach(inst => {
    const r=inst.Region||"?",ad=shortAD(inst.Availability_Domain),fd=shortFD(inst.Fault_Domain);
    if(!heatmap[r])heatmap[r]={};if(!heatmap[r][ad])heatmap[r][ad]={};if(!heatmap[r][ad][fd])heatmap[r][ad][fd]={scheduled:0,notScheduled:0,completed:0,instances:[],dates:[]};
    const c=heatmap[r][ad][fd]; c.instances.push(inst);
    if(inst.reboot_status==="Scheduled"){c.scheduled++;const d=pD(inst.Maintenance_UTC);if(d)c.dates.push(d);} else if(inst.reboot_status==="Completed")c.completed++; else c.notScheduled++;
  });

  // Gaps
  const gaps = [];
  // DR overlap
  const schedRegions = [...new Set(scheduled.map(i=>i.Region))];
  if(schedRegions.length>1) {
    const overlaps = [];
    for(let a=0;a<schedRegions.length;a++) for(let b=a+1;b<schedRegions.length;b++) overlaps.push([schedRegions[a],schedRegions[b]]);
    overlaps.forEach(([ra,rb])=>{
      const aCount=scheduled.filter(i=>i.Region===ra).length, bCount=scheduled.filter(i=>i.Region===rb).length;
      gaps.push({type:"dr_overlap",severity:"critical",title:`Primary + DR regions both have scheduled maintenance`,detail:`${ra} has ${aCount} scheduled and ${rb} has ${bCount} scheduled. Multiple regions are patched simultaneously — only FDs within the same AD are sequential. Failing over to a DR region does NOT guarantee avoidance of maintenance. Plan for both regions being affected.`,instances:scheduled.filter(i=>i.Region===ra||i.Region===rb)});
    });
  }
  // Single-FD concentration
  const compFDs={};
  instances.forEach(i=>{const k=`${i.Region}|${i.Compartment_Name}`;if(!compFDs[k])compFDs[k]=new Set();compFDs[k].add(i.Fault_Domain);});
  Object.entries(compFDs).forEach(([k,fds])=>{if(fds.size===1){const[r,c]=k.split("|");const af=instances.filter(i=>i.Region===r&&i.Compartment_Name===c);if(af.length>1)gaps.push({type:"single_fd",severity:"high",title:`All ${af.length} instances in "${c}" (${r}) share ${shortFD([...fds][0])}`,detail:"Entire workload group affected simultaneously during FD maintenance. Distribute across 2+ fault domains.",instances:af});}});
  // DenseIO
  denseSched.forEach(i=>{gaps.push({type:"dense_nvme",severity:"critical",title:`DenseIO "${i.Display_Name}" — NVMe backup required`,detail:`${i.Shape} has local NVMe. Back up before ${fDT(pD(i.Maintenance_UTC))}. Do NOT use Stop/Start — stopping destroys NVMe data.`,instances:[i]});});
  // OKE
  if(okeSched.length>0) gaps.push({type:"oke",severity:"high",title:`${okeSched.length} OKE node(s) need drain or kill/replace`,detail:"Cordon and drain (or terminate and let autoscaler replace, or use Node Cycling with maxSurge) before the window. See OKE Playbook tab.",instances:okeSched});
  // GPU
  const gpuSched=scheduled.filter(i=>isGPU(i.Shape));
  if(gpuSched.length>0) gaps.push({type:"gpu_ooc",severity:"critical",title:`${gpuSched.length} GPU instance(s) scheduled — extreme OOC risk if Stop/Start is attempted`,detail:"GPU shapes have very limited capacity. Do NOT use Stop/Start. Use FD Move if peers exist in other FDs, otherwise Over-Provision a replacement first.",instances:gpuSched});
  // ARM (A1/A2)
  const armSched=scheduled.filter(i=>isARM(i.Shape));
  if(armSched.length>0) gaps.push({type:"arm_capacity",severity:"high",title:`${armSched.length} ARM-based instance(s) (A1/A2) scheduled — constrained capacity for FD moves`,detail:"A1 and A2 shapes have limited host capacity. FD moves and Stop/Start may fail with OUT_OF_HOST_CAPACITY even when capacity reports show AVAILABLE. Check capacity per FD before attempting moves. Try different ADs or off-peak hours if blocked.",instances:armSched});
  // BM
  const bmSched=scheduled.filter(i=>isBM(i.Shape));
  if(bmSched.length>0) gaps.push({type:"bm_info",severity:"medium",title:`${bmSched.length} Bare Metal instance(s) — self-service firmware update`,detail:"Bare Metal customers control their own update timing. No Oracle-initiated reboot. Execute the update at a convenient maintenance window.",instances:bmSched});
  // Maintenance pending — always flag when instances are scheduled
  if(scheduled.length>0) {
    const earliest=scheduled.map(i=>pD(i.Maintenance_UTC)).filter(Boolean).sort((a,b)=>a-b)[0];
    const latest=scheduled.map(i=>pD(i.Maintenance_UTC)).filter(Boolean).sort((a,b)=>b-a)[0];
    const windowStr=earliest&&latest&&earliest.getTime()!==latest.getTime()?`${fDT(earliest)} through ${fDT(latest)}`:earliest?fDT(earliest):"TBD";
    gaps.push({type:"maintenance_pending",severity:"high",title:`${scheduled.length} instance${scheduled.length!==1?"s":""} scheduled for firmware maintenance`,detail:`Maintenance window: ${windowStr}. During each window, the instance is powered off for approximately 20 minutes while the hypervisor firmware is updated. The instance restarts automatically on the same host. No live migration is available for this maintenance type.`,instances:scheduled});
    // Check if any scheduled instances lack peers (singletons with no HA)
    const schedSingletons=scheduled.filter(i=>isSingleton(i,instances)&&!isDense(i.Shape)&&!isOKE(i)&&!isBM(i.Shape)&&!isGPU(i.Shape));
    if(schedSingletons.length>0) gaps.push({type:"singleton_risk",severity:"high",title:`${schedSingletons.length} scheduled instance${schedSingletons.length!==1?"s are":" is"} a singleton with no peers`,detail:"These instances have no peers in the same compartment and region. During the ~20 minute maintenance window, the workload will be completely unavailable. Consider pre-staging a replacement instance if downtime is not acceptable.",instances:schedSingletons});
    // Check for instances with signal changes
    const schedChanged=scheduled.filter(i=>i.Status_Change_Signal&&!["Stable","","-"].includes(i.Status_Change_Signal));
    if(schedChanged.length>0) gaps.push({type:"signal_change",severity:"medium",title:`${schedChanged.length} scheduled instance${schedChanged.length!==1?"s have":" has"} a recent status change signal`,detail:"These instances had their maintenance status change since the last snapshot. Review the signal to determine if the window was rescheduled, updated, or newly assigned.",instances:schedChanged});
  }

  // Strategies
  const strategies = scheduled.map(i=>({...i,strategy:classifyStrategy(i,instances),_date:pD(i.Maintenance_UTC)}));
  strategies.sort((a,b)=>(a._date||0)-(b._date||0));

  const timeline = strategies.filter(i=>i._date);
  const timelineRange = timeline.length?{min:timeline[0]._date,max:timeline[timeline.length-1]._date}:null;

  // Cost model
  const stratCounts = {};
  strategies.forEach(s=>{stratCounts[s.strategy.id]=(stratCounts[s.strategy.id]||0)+1;});

  return {instances,scheduled,completed,notSched,denseSched,okeSched,changed,heatmap,gaps,strategies,timeline,timelineRange,stratCounts,subscribedRegions:(data.source||{}).regions||[],tenancyName:(data.customers||[])[0]?.name||"Tenancy",generatedAt:data.generatedAt||"",regionDetails:data.regionDetails||{}};
}

// ─── Shared ───
const S={
  card:{background:"#fff",border:"1px solid #e7dfdb",borderRadius:14,padding:"18px 20px",minWidth:140,flex:"1 1 155px"},
  cL:{fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#8a7f79",marginBottom:5},
  cV:(c)=>({fontSize:28,fontWeight:800,color:c||"#1f1b1a",lineHeight:1.1}),
  cS:{fontSize:10,color:"#8a7f79",marginTop:3},
  h2:{fontSize:15,fontWeight:800,margin:"0 0 4px 0",color:"#1f1b1a"},
  desc:{fontSize:12,color:"#8a7f79",margin:"0 0 16px 0",lineHeight:1.6},
  panel:{background:"#fff",border:"1px solid #e7dfdb",borderRadius:16,padding:"24px",minHeight:300},
};
function Badge({status,children}){const C={scheduled:{bg:"#fef3c7",b:"#f59e0b",t:"#92400e",d:"#f59e0b"},completed:{bg:"#dcfce7",b:"#22c55e",t:"#166534",d:"#22c55e"},notScheduled:{bg:"#f1f5f9",b:"#cbd5e1",t:"#475569",d:"#94a3b8"}};const c=C[status]||C.notScheduled;return (<span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 9px",borderRadius:7,fontSize:10,fontWeight:700,background:c.bg,color:c.t,border:`1px solid ${c.b}`}}><span style={{width:5,height:5,borderRadius:"50%",background:c.d}}/>{children}</span>);}
function Sev({s}){const m={critical:{bg:"#fef2f2",b:"#fca5a5",c:"#991b1b",l:"CRITICAL"},high:{bg:"#fef3c7",b:"#fcd34d",c:"#92400e",l:"HIGH"},medium:{bg:"#eff6ff",b:"#93c5fd",c:"#1e40af",l:"MEDIUM"}};const c=m[s]||m.medium;return (<span style={{padding:"2px 7px",borderRadius:5,fontSize:9,fontWeight:800,letterSpacing:"0.06em",background:c.bg,color:c.c,border:`1px solid ${c.b}`}}>{c.l}</span>);}
function Chip({n}){return (<span style={{fontSize:10,padding:"2px 6px",borderRadius:5,background:"#f3f2f0",border:"1px solid #d6d2cd",color:"#5d5753",fontWeight:600}}>{n}</span>);}
function Step({n,title,cmd,note,color}){return (<div style={{display:"flex",gap:12,padding:"10px 0"}}><div style={{width:26,height:26,borderRadius:"50%",background:color||"#c74634",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,flexShrink:0}}>{n}</div><div style={{flex:1}}><div style={{fontWeight:700,fontSize:12,color:"#1f1b1a",marginBottom:2}}>{title}</div>{cmd&&<code style={{display:"block",background:"#1b1715",color:"#f7f4f2",padding:"5px 9px",borderRadius:5,fontSize:10,fontFamily:"SFMono-Regular,Consolas,monospace",marginBottom:3,overflowX:"auto"}}>{cmd}</code>}<div style={{fontSize:11,color:"#6b6560",lineHeight:1.5}}>{note}</div></div></div>);}

// ─── Tab: Strategy Picker ───
function TabStrategy({strategies}){
  const groups = {};
  strategies.forEach(s=>{if(!groups[s.strategy.id])groups[s.strategy.id]={strategy:s.strategy,instances:[]};groups[s.strategy.id].instances.push(s);});
  const order = ["bm_self_service","wait_backup","oke_drain_replace","fd_move_buffer","stop_start","overprovision_then_move"];
  const sorted = order.filter(id=>groups[id]).map(id=>groups[id]);
  const now=Date.now();
  function cdStr(d){if(!d)return"";const ms=d.getTime()-now;if(ms<0)return"Window passed";const dd=Math.floor(ms/864e5),hh=Math.floor((ms%864e5)/36e5);return dd>0?dd+"d "+hh+"h remaining":hh+"h remaining";}
  return(
    <div>
      <h2 style={S.h2}>Remediation Strategy Picker</h2>
      <p style={S.desc}>Each scheduled instance is classified into a recommended action based on its shape, workload type, fault domain placement, and peer topology. Expand each strategy group to see per-instance detail with maintenance windows and countdown timers.</p>

      {/* Summary bar */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
        {sorted.map(({strategy:st,instances:insts})=>(
          <div key={st.id} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:10,background:st.color+"0a",border:`1.5px solid ${st.color}22`}}>
            <span style={{fontSize:18}}>{st.icon}</span>
            <span style={{fontSize:24,fontWeight:800,color:st.color}}>{insts.length}</span>
            <span style={{fontSize:11,fontWeight:700,color:st.color}}>{st.label}</span>
          </div>
        ))}
      </div>

      {/* Self-service reference */}
      <div style={{background:"#f8f6f4",borderRadius:12,padding:"16px 18px",marginBottom:20}}>
        <div style={{fontWeight:800,fontSize:12,marginBottom:10,color:"#1f1b1a"}}>Field Intelligence Reference <span style={{fontSize:9,fontWeight:700,color:"#92400e",background:"#fef3c7",padding:"2px 6px",borderRadius:4,marginLeft:6}}>SE-ONLY</span></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div>
            <div style={{fontSize:10,fontWeight:800,color:"#16a34a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>✓ Confirmed Working</div>
            {[
              "Stop/Start: moves VM to a new host, clears maintenance event. New host gets fresh ~10-day window. OOC capacity risk applies.",
              "FD Move: edit instance → change fault domain. ~10-day buffer. OOC capacity risk.",
              "OKE Kill/Replace: terminate node, autoscaler provisions on clean host. Field-validated at 204 VMs.",
              "OKE Node Cycling: set maximumSurge, trigger Cycle Nodes — OKE handles placement on clean host.",
              "Cordon + Drain: pods migrate to healthy nodes. Zero downtime for workload.",
              "Bare Metal: self-service — customer executes firmware update at their chosen time.",
              "Stopped VMs stay stopped: Oracle does not start stopped instances during maintenance.",
              "Block volume backups (OCI native): unaffected — snapshots happen at block level.",
              "Hosts scheduled for maintenance are CLOSED for placement — new/moved VMs will land on clean hosts.",
            ].map((t,i)=><div key={i} style={{fontSize:11,color:"#15803d",lineHeight:1.6,marginBottom:3,display:"flex",gap:4}}><span style={{color:"#16a34a",flexShrink:0}}>✓</span><span>{t}</span></div>)}
          </div>
          <div>
            <div style={{fontSize:10,fontWeight:800,color:"#dc2626",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>✗ Does NOT Work / Common Misconceptions</div>
            {[
              "Force Reboot: stays on the SAME host. Does not clear maintenance. Never use this.",
              "Reboot: stays on the same host. Does not clear maintenance.",
              "DR Failover: DR regions are patched concurrently. Failing over does NOT avoid maintenance.",
              "DenseIO Stop/Start: stopping permanently destroys all local NVMe data.",
              "GPU Stop/Start: extreme OOC risk. GPU capacity is highly constrained — instance may be stranded.",
              "Capacity Reservations: do NOT tie to a specific hypervisor. Will not guarantee placement after Stop/Start.",
              "Due Date in Console: this is a BUG — shows 60-day default. Only 'Scheduled to start' time matters.",
              "In-guest backup agents: affected by the instance shutdown. Only OCI native block volume backups are safe.",
              "FD/AD serial patching: hosts are batched into staggered groups, NOT patched FD-by-FD serially.",
              "Live Migration: not available for this maintenance. There is NO Oracle legal approved messaging to share with customers about why. Do not speculate — simply state it is not available.",
            ].map((t,i)=><div key={i} style={{fontSize:11,color:"#b91c1c",lineHeight:1.6,marginBottom:3,display:"flex",gap:4}}><span style={{color:"#dc2626",flexShrink:0}}>✗</span><span>{t}</span></div>)}
          </div>
        </div>
        {/* Known bugs and field notes */}
        <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #e7dfdb"}}>
          <div style={{fontSize:10,fontWeight:800,color:"#d97706",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>⚡ Field Notes</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[
              {title:"PROCESSING after FD Move",note:"Known compute bug. Maintenance status shows PROCESSING after FD change instead of CANCELED. Workaround: if PROCESSING does not clear, terminate the instance and re-spin with the same boot disk in the same AD — maintenance status clears to CANCELED. Validate via C4PO if needed."},
              {title:"Maintenance campaign timeline",note:"Feb 25 - early May 2026. Multi-AD regions run 24/7. Single-AD regions scheduled during off-hours local time (UTC published)."},
              {title:"Notification lead time",note:"Customers get ~10 days advance notice. No published future schedule for specific hosts beyond the notification."},
              {title:"Instance lands on unpatched host",note:"If a new/moved instance lands on an unpatched host, it will be scheduled for maintenance in a future window (~10 day notice)."},
              {title:"OCI Events for monitoring",note:"Filter on Instance Action Begin/End events for SOFTSTOP and START to detect maintenance in real-time. Also use Compute Instance Health Metrics, Monitoring API, or Availability Monitoring to detect instance recovery."},
              {title:"Exception process",note:"Exists but granted only in extremely rare cases. Customer must follow the published escalation path."},
              {title:"Firmware Update vs Evacuation",note:"Some instances show 'Evacuation' instead of 'Firmware Update' as the maintenance reason. If a customer reports this, forward specific OCIDs and the notification email to compute for review — do not speculate on the difference."},
              {title:"Daily fleet impact of self-service moves",note:"VM movement via Stop/Start or FD Move affects only 2-4% of the fleet daily (1 day out of 35 days). Impact on regional capacity after movement should be minimal. Validate in non-prod before production. High-demand shapes (GPU) should NOT use this approach."},
              {title:"Autoscaling / Instance Pools",note:"Maintenance is NOT a failure event. Autoscaling does not trigger a replacement. The pool's current size does not decrease permanently during a reboot, so no replacement is automatically launched. For OKE, the control plane may try to provision pods on a new node — use Node Cycling proactively instead."},
              {title:"Group VMs by workload",note:"Work with customers to group VMs by workload. If any component is affected, do a controlled off-hours shutdown of ALL related systems together, re-FD or re-spin the VMs, then bring everything back up. This resets the clock for the entire workload group in one coordinated window."},
              {title:"Nightly automation",note:"For large fleets, recommend scheduling migrate_fd.py (Gururaj's script) as a nightly cron job in dry-run mode. It monitors PLANNED_CHANGE announcements, identifies affected instances, and can auto-migrate when EXECUTE_FD_MIGRATE=1 is set. Skips already-completed and CANCELED maintenance automatically."},
              {title:"CSS team awareness (SE only)",note:"CSS was not fully informed about this maintenance campaign initially. This was addressed on Apr 3. If a customer reports conflicting guidance from CSS, escalate through the SE channel — CSS may have given outdated advice."},
              {title:"A1/A2 (ARM) shapes — constrained capacity",note:"A1 and A2 shapes have limited host capacity. FD moves may fail with OUT_OF_HOST_CAPACITY even when the OCI_ComputeCapacityReport tool shows AVAILABLE — the report is a point-in-time snapshot and actual placement can fail if host capacity is exhausted. During this campaign, ~2-4% of fleet is in motion daily, further reducing available capacity. Try different ADs, attempt off-peak hours, or accept the maintenance window. Open an SR for capacity assistance if critical."},
              {title:"OCI_ComputeCapacityReport tool",note:"github.com/Olygo/OCI_ComputeCapacityReport — checks capacity per region/AD/FD/shape. Useful as a guide but NOT a guarantee of placement. Point-in-time snapshot. Capacity fluctuates during the maintenance campaign. Always have a fallback plan (accept the window) if FD move fails."},
              {title:"Internal validation tools (SE only)",note:"ZZ_HOSTNIC_ANALYSIS dashboard: filter by Tenant_ID on the VM page to see instances on unpatched hosts and the firmware update map. C4PO: verify hypervisor evacuation status after a customer does a Stop/Start or FD move. Use these to validate host status when a customer reports PROCESSING or unclear maintenance state."},
            ].map((f,i)=><div key={i} style={{fontSize:10,lineHeight:1.5,padding:"6px 8px",background:"#fff",borderRadius:6,border:"1px solid #f2ebe7"}}><span style={{fontWeight:700,color:"#1f1b1a"}}>{f.title}:</span> <span style={{color:"#5f5956"}}>{f.note}</span></div>)}
          </div>
        </div>
      </div>

      {/* Strategy groups with per-instance detail */}
      {sorted.map(({strategy:st,instances:insts})=>(
        <div key={st.id} style={{border:`1.5px solid ${st.color}22`,borderLeft:`4px solid ${st.color}`,borderRadius:12,padding:"18px 20px",marginBottom:16,background:`${st.color}06`}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontSize:22}}>{st.icon}</span>
            <span style={{fontWeight:800,fontSize:15,color:st.color}}>{st.label}</span>
            <span style={{fontSize:10,fontWeight:700,color:"#8a7f79",background:"#f3f2f0",padding:"2px 8px",borderRadius:5}}>{insts.length} instance{insts.length!==1?"s":""}</span>
            {st.selfService&&<span style={{fontSize:9,fontWeight:700,color:"#16a34a",background:"#f0fdf4",padding:"2px 6px",borderRadius:4,border:"1px solid #86efac"}}>Self-Service Available</span>}
            {st.costImpact!=="none"&&<span style={{fontSize:9,fontWeight:700,color:"#b45309",background:"#fffbeb",padding:"2px 6px",borderRadius:4,border:"1px solid #fde68a"}}>💰 {st.costImpact}</span>}
            <span style={{fontSize:9,fontWeight:700,color:st.risk==="high"?"#dc2626":st.risk==="medium"?"#d97706":"#16a34a",background:st.risk==="high"?"#fef2f2":st.risk==="medium"?"#fffbeb":"#f0fdf4",padding:"2px 6px",borderRadius:4,border:`1px solid ${st.risk==="high"?"#fca5a5":st.risk==="medium"?"#fde68a":"#86efac"}`}}>Risk: {st.risk}</span>
          </div>
          <p style={{fontSize:12,color:"#5f5956",margin:"0 0 12px 0",lineHeight:1.6}}>{st.summary}</p>

          {/* Numbered action steps */}
          <div style={{background:"#fff",borderRadius:10,padding:"12px 14px",marginBottom:12,border:"1px solid #f2ebe7"}}>
            <div style={{fontSize:10,fontWeight:800,color:"#8a7f79",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Action Steps</div>
            {st.actions.map((a,i)=><div key={i} style={{fontSize:11,color:a.startsWith("⚠")?"#b91c1c":"#5f5956",fontWeight:a.startsWith("⚠")?600:400,lineHeight:1.6,display:"flex",gap:8,marginBottom:4}}>
              <span style={{width:20,height:20,borderRadius:"50%",background:a.startsWith("⚠")?"#fef2f2":st.color,color:a.startsWith("⚠")?"#dc2626":"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:9,flexShrink:0,border:a.startsWith("⚠")?`1px solid #fca5a5`:"none"}}>{a.startsWith("⚠")?"!":i+1}</span>
              <span>{a.startsWith("⚠")?a.slice(2):a}</span>
            </div>)}
          </div>

          {/* Per-instance cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))",gap:8}}>
            {insts.map(i=>{
              const d=i._date;const cd=cdStr(d);
              return(
              <div key={i.ID} style={{background:"#fff",borderRadius:10,padding:"12px 14px",border:`1px solid ${st.color}22`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <div style={{fontWeight:800,fontSize:13,color:"#1f1b1a"}}>{i.Display_Name}</div>
                    <div style={{fontSize:10,color:"#8a7f79"}}>{i.Shape}</div>
                  </div>
                  {cd&&<span style={{fontSize:10,fontWeight:700,color:d&&d.getTime()-now<7*864e5?"#dc2626":"#d97706",background:d&&d.getTime()-now<7*864e5?"#fef2f2":"#fffbeb",padding:"2px 8px",borderRadius:5,whiteSpace:"nowrap"}}>{cd}</span>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2,fontSize:10,color:"#5f5956",marginBottom:6}}>
                  <span>Region: <b>{i.Region}</b></span>
                  <span>FD: <b>{shortFD(i.Fault_Domain)}</b></span>
                  <span>AD: <b>{shortAD(i.Availability_Domain)}</b></span>
                  <span>Compartment: <b>{i.Compartment_Name}</b></span>
                </div>
                {d&&<div style={{borderTop:"1px solid #f2ebe7",paddingTop:6}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#1f1b1a"}}>Maintenance Window</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:2,fontSize:10,color:"#5f5956",marginTop:2}}>
                    <span><b>UTC:</b> {i.Maintenance_UTC||"—"}</span>
                    <span><b>IST:</b> {i.Maintenance_IST||"—"}</span>
                    <span><b>EDT:</b> {i.Maintenance_EDT||"—"}</span>
                  </div>
                </div>}
                {i.Status_Change_Signal&&!["Stable","","-"].includes(i.Status_Change_Signal)&&<div style={{marginTop:4,fontSize:10,fontWeight:700,color:"#c74634",background:"#fdf1ef",padding:"2px 6px",borderRadius:4,display:"inline-block"}}>Signal: {i.Status_Change_Signal}</div>}
              </div>);
            })}
          </div>
        </div>
      ))}

      {strategies.length===0&&<div style={{background:"#f0fdf4",borderRadius:12,padding:"24px",textAlign:"center"}}><div style={{fontSize:15,fontWeight:700,color:"#16a34a"}}>No Scheduled Maintenance</div><div style={{fontSize:12,color:"#15803d",marginTop:4}}>All instances are clear. No remediation actions needed.</div></div>}
    </div>
  );
}

// ─── Tab: FD Heatmap ───
function TabHeatmap({heatmap,subscribedRegions,filterRegion,regionDetails}){
  const allRegions = filterRegion==="all" ? (subscribedRegions||Object.keys(heatmap)).sort() : [filterRegion];
  const ALL_FDS=["FD-1","FD-2","FD-3"];
  // Build a shortAD→fullAD lookup from regionDetails
  const getADsForRegion=(region)=>{
    // Priority 1: regionDetails from collector (has full AD list from OCI API)
    const rd=regionDetails[region];
    if(rd&&rd.availabilityDomains&&rd.availabilityDomains.length>0) return rd.availabilityDomains;
    // Priority 2: derive from instance data (ADs where we have instances)
    const hmADs=heatmap[region]?Object.keys(heatmap[region]).sort():[];
    if(hmADs.length>0) return hmADs;
    // Priority 3: no data at all for this region
    return [];
  };
  return(<div>
    <h2 style={S.h2}>Fault Domain Impact Map</h2>
    <p style={S.desc}>All availability domains and fault domains across every subscribed region. Maintenance is applied one fault domain at a time within each AD. Empty FDs are available as staging targets. Multiple regions CAN be patched simultaneously.</p>
    {allRegions.map(region=>{
      const ads=getADsForRegion(region);
      const hmRegion=heatmap[region]||{};
      if(ads.length===0) return(
        <div key={region} style={{marginBottom:24}}>
          <div style={{fontSize:13,fontWeight:800,color:"#c74634",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:4,height:16,borderRadius:2,background:"#c74634",display:"inline-block"}}/>{region}
          </div>
          <div style={{marginLeft:10,padding:"14px 18px",background:"#f8f6f4",borderRadius:10,border:"1px solid #e7dfdb"}}>
            <span style={{fontSize:11,color:"#8a7f79"}}>No instances deployed in this region</span>
          </div>
        </div>
      );
      // Count instances + scheduled for region summary
      const regionInstCount=Object.values(hmRegion).reduce((t,adFds)=>t+Object.values(adFds).reduce((s,c)=>s+c.scheduled+c.notScheduled+c.completed,0),0);
      const regionSchedCount=Object.values(hmRegion).reduce((t,adFds)=>t+Object.values(adFds).reduce((s,c)=>s+c.scheduled,0),0);
      return(<div key={region} style={{marginBottom:24}}>
      <div style={{fontSize:13,fontWeight:800,color:"#c74634",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
        <span style={{width:4,height:16,borderRadius:2,background:"#c74634",display:"inline-block"}}/>{region}
        <span style={{fontSize:10,fontWeight:600,color:"#8a7f79",marginLeft:4}}>{ads.length} AD{ads.length!==1?"s":""}</span>
        {regionInstCount>0&&<span style={{fontSize:10,fontWeight:600,color:"#5f5956"}}>{regionInstCount} instance{regionInstCount!==1?"s":""}</span>}
        {regionSchedCount>0&&<span style={{fontSize:10,fontWeight:700,color:"#92400e",background:"#fef3c7",padding:"1px 6px",borderRadius:4}}>{regionSchedCount} scheduled</span>}
        {regionInstCount===0&&<span style={{fontSize:10,fontWeight:600,color:"#8a7f79"}}>No instances deployed</span>}
      </div>
      {ads.map(adFull=>{
        const adShort=shortAD(adFull);
        // Match heatmap data by short AD name (heatmap keys are shortAD)
        const hmAD=hmRegion[adShort]||{};
        return(<div key={adFull} style={{marginBottom:12,marginLeft:10}}>
        <div style={{fontSize:11,fontWeight:700,color:"#5f5956",marginBottom:6}}>{adShort}</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {ALL_FDS.map(fd=>{
            const cell=hmAD[fd];
            if(!cell){
              return(<div key={fd} style={{background:"#fff",border:"1.5px dashed #d7d2cd",borderRadius:10,padding:"10px 12px",minWidth:140}}>
                <div style={{fontWeight:800,fontSize:12,marginBottom:4,color:"#b0a8a2"}}>{fd}</div>
                <div style={{fontSize:10,color:"#b0a8a2"}}>No instances</div>
                <div style={{fontSize:9,color:"#16a34a",fontWeight:700,marginTop:4,background:"#f0fdf4",padding:"2px 6px",borderRadius:4,display:"inline-block"}}>Available for staging</div>
              </div>);
            }
            const hot=cell.scheduled>0,done=cell.completed>0&&!hot;
            const bg=hot?"linear-gradient(135deg,#fef3c7,#fde68a)":done?"linear-gradient(135deg,#dcfce7,#bbf7d0)":"#f8f6f4";
            const bdr=hot?"#f59e0b":done?"#86efac":"#e7dfdb";
            const earliest=cell.dates.length?new Date(Math.min(...cell.dates.map(d=>d.getTime()))):null;
            const total=cell.scheduled+cell.notScheduled+cell.completed;
            const hasDense=cell.instances.some(i=>isDense(i.Shape)&&i.reboot_status==="Scheduled");
            return(<div key={fd} style={{background:bg,border:`1.5px solid ${bdr}`,borderRadius:10,padding:"10px 12px",minWidth:140,position:"relative"}}>
              {hasDense&&<span style={{position:"absolute",top:6,right:8,fontSize:9,fontWeight:800,color:"#dc2626",background:"#fef2f2",padding:"1px 5px",borderRadius:4,border:"1px solid #fca5a5"}}>NVMe</span>}
              <div style={{fontWeight:800,fontSize:12,marginBottom:4}}>{fd}</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {cell.scheduled>0&&<Badge status="scheduled">{cell.scheduled} sched.</Badge>}
                {cell.completed>0&&<Badge status="completed">{cell.completed} done</Badge>}
                {cell.notScheduled>0&&<Badge status="notScheduled">{cell.notScheduled} clear</Badge>}
              </div>
              {earliest&&<div style={{fontSize:10,color:"#92400e",marginTop:5,fontWeight:600}}>Next: {fD(earliest)} {fT(earliest)}</div>}
              <div style={{fontSize:10,color:"#8a7f79",marginTop:2}}>{total} inst.</div>
            </div>);
          })}
        </div>
      </div>);
      })}
    </div>);
    })}
    <div style={{display:"flex",gap:14,flexWrap:"wrap",marginTop:14,paddingTop:14,borderTop:"1px solid #f2ebe7"}}>
      {[["linear-gradient(135deg,#fef3c7,#fde68a)","#f59e0b","Scheduled"],["linear-gradient(135deg,#dcfce7,#bbf7d0)","#86efac","Completed"],["#f8f6f4","#e7dfdb","Clear (has instances)"],["#fff","#d7d2cd","Empty (available for staging)"]].map(([bg,b,l])=>(<div key={l} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#8a7f79"}}><span style={{width:12,height:12,borderRadius:4,background:bg,border:`1px ${l.includes("Empty")?"dashed":"solid"} ${b}`}}/>{l}</div>))}
    </div>
  </div>);
}

// ─── Tab: Timeline ───
function TabTimeline({timeline,timelineRange}){
  return(<div>
    <h2 style={S.h2}>Maintenance Timeline</h2>
    <p style={S.desc}>All {timeline.length} scheduled instances sorted chronologically. Each dot shows the strategy classification.</p>
    {timelineRange&&<div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#8a7f79",marginBottom:6,padding:"0 130px 0 186px"}}><span>{fD(timelineRange.min)}</span><span>{fD(timelineRange.max)}</span></div>}
    {timeline.map(inst=>{
      if(!timelineRange)return null;
      const span=timelineRange.max.getTime()-timelineRange.min.getTime()||1;
      const left=((inst._date.getTime()-timelineRange.min.getTime())/span)*100;
      return(<div key={inst.ID} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:"1px solid #f2ebe7"}}>
        <div style={{width:180,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          <span style={{fontSize:12,fontWeight:600}}>{inst.Display_Name}</span>
          <span style={{marginLeft:4,fontSize:9,fontWeight:800,color:inst.strategy.color,background:`${inst.strategy.color}11`,padding:"1px 4px",borderRadius:3}}>{inst.strategy.icon}</span>
        </div>
        <div style={{flex:1,position:"relative",height:22,background:"#f8f6f4",borderRadius:6,overflow:"hidden"}}>
          <div style={{position:"absolute",left:`${Math.max(0,Math.min(left,95))}%`,top:2,width:18,height:18,borderRadius:"50%",background:inst.strategy.color,border:"2px solid #fff",boxShadow:"0 1px 4px rgba(0,0,0,0.15)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:8,color:"#fff",fontWeight:800}}>{inst._date.getDate()}</span>
          </div>
        </div>
        <div style={{width:130,flexShrink:0,textAlign:"right"}}><span style={{fontSize:11,color:"#5f5956"}}>{fDT(inst._date)}</span></div>
      </div>);
    })}
  </div>);
}

// ─── Tab: Gaps ───
function TabGaps({gaps,seMode}){
  const criticals=gaps.filter(g=>g.severity==="critical");
  const highs=gaps.filter(g=>g.severity==="high");
  const mediums=gaps.filter(g=>g.severity==="medium");
  const remediation=seMode?{
    dr_overlap:{icon:"🌐",action:["Review the Timeline tab to identify overlapping windows across regions","Stagger self-service remediation (FD moves, Stop/Start) so you are not moving instances in both regions simultaneously","Ensure application-level failover can tolerate one region in maintenance while the other is mid-remediation"]},
    single_fd:{icon:"🏗",action:["Redistribute instances across 2+ fault domains using the FD Impact Map","Edit each instance to change its fault domain","Prioritize instances behind load balancers — they benefit most from FD distribution"]},
    dense_nvme:{icon:"🛡",action:["Back up all local NVMe data immediately","Validate backup integrity and confirm restore path","Do NOT use Stop/Start — stopping permanently erases local NVMe storage","Accept the scheduled maintenance window (~20 min reboot)"]},
    oke:{icon:"⎈",action:["Cordon each node to stop new pod scheduling","Drain to migrate existing pods to healthy nodes","Option A: Wait for maintenance reboot, then uncordon (zero cost)","Option B: Terminate node, autoscaler provisions replacement on clean host","Option C: Use OKE Node Cycling with maxSurge — OKE handles everything","See OKE Playbook tab for detailed kubectl commands"]},
    gpu_ooc:{icon:"🎮",action:["Do NOT use Stop/Start — GPU capacity is extremely constrained","If peers exist in other FDs, use FD Move as the safer option","For singletons, provision a replacement GPU instance first (Over-Provision)","Accept the maintenance window if ~20 min downtime is tolerable"]},
    arm_capacity:{icon:"⚠",action:["A1/A2 (ARM) shapes have constrained host capacity — FD moves may fail with OUT_OF_HOST_CAPACITY","Use OCI_ComputeCapacityReport (github.com/Olygo/OCI_ComputeCapacityReport) to check per-FD availability before attempting moves","Target only FDs showing AVAILABLE — do not attempt moves to OUT_OF_HOST_CAPACITY FDs","Try different ADs if the region has multiple ADs (e.g., us-chicago-1 has 3 ADs with independent capacity pools)","Try off-peak hours when capacity churn from the maintenance campaign is lower","If all FDs show OUT_OF_HOST_CAPACITY for this shape, accept the maintenance window — it is the only safe option","Open an SR for capacity assistance if the customer has a critical business requirement"]},
    bm_info:{icon:"🔧",action:["Bare Metal instances are self-service — no Oracle-initiated reboot","Customer schedules and executes the firmware update at their convenience","Coordinate the update timing with the customer's maintenance window"]},
    maintenance_pending:{icon:"📋",action:["Review the Strategy Picker tab for per-instance recommendations","Each instance is classified by shape, workload type, and fault domain topology","Accept the ~20 min reboot if downtime is tolerable (zero cost, zero risk)","Use FD Move or Stop/Start to relocate ahead of the window (OOC capacity risk applies)","Hosts scheduled for maintenance are closed for placement — moved instances land on clean hosts"]},
    singleton_risk:{icon:"⚠",action:["These instances have no peers — workload is fully unavailable during ~20 min window","Option A: Accept the downtime if tolerable","Option B: Pre-stage a replacement in a different FD, validate, cut traffic (Over-Provision strategy)","Do NOT use Stop/Start without a replacement ready — OOC risk leaves you with zero instances"]},
    signal_change:{icon:"🔔",action:["Check the Status Change Signal in Fleet View for each instance","'Not Scheduled -> Scheduled' means newly assigned maintenance","'Maintenance Updated' means the window was modified","Review the Timeline tab for updated scheduling"]},
  }:{
    dr_overlap:{icon:"🌐",action:["Maintenance windows may overlap across your primary and DR regions","Work with your Oracle team to review timing for each region","Plan for the possibility of concurrent impact in both environments"]},
    single_fd:{icon:"🏗",action:["All instances in this workload group share a single fault domain","Work with your Oracle team to review fault domain distribution","Distributing across fault domains improves availability during maintenance"]},
    dense_nvme:{icon:"🛡",action:["This instance uses local NVMe storage","NVMe data must be backed up before the maintenance window","Work with your Oracle team to plan the backup and maintenance approach"]},
    oke:{icon:"⎈",action:["Kubernetes worker nodes require preparation before the maintenance window","Workloads should be migrated off scheduled nodes to avoid pod disruption","Work with your Oracle team to plan the node maintenance approach"]},
    gpu_ooc:{icon:"🎮",action:["GPU instances require special handling due to capacity constraints","Standard relocation approaches carry higher risk for GPU shapes","Work with your Oracle team to plan the safest maintenance approach"]},
    arm_capacity:{icon:"⚠",action:["A1/A2 (ARM) shapes have limited host capacity in some fault domains","FD relocation may not be immediately available due to capacity constraints","Work with your Oracle team to identify available fault domains before attempting moves","Accepting the scheduled maintenance window (~20 min reboot) may be the safest option"]},
    bm_info:{icon:"🔧",action:["Bare Metal instances support self-service firmware updates","You control the timing — no Oracle-initiated reboot will occur","Schedule the update at a convenient maintenance window"]},
    maintenance_pending:{icon:"📋",action:["Infrastructure maintenance is scheduled for these instances","During the window, each instance is powered off for ~20 minutes while firmware is updated","Instances restart automatically — no action is required","Work with your Oracle team if you need to coordinate timing or minimize impact"]},
    singleton_risk:{icon:"⚠",action:["These instances have no redundant peers in the same region","During the ~20 minute window, the workload will be temporarily unavailable","Work with your Oracle team to discuss options if downtime needs to be minimized"]},
    signal_change:{icon:"🔔",action:["The maintenance status for these instances has been recently updated","Review the updated maintenance windows in the Timeline tab","Work with your Oracle team if the new timing requires coordination"]},
  };
  return(<div>
    <h2 style={S.h2}>Resiliency Gap Analysis</h2>
    <p style={S.desc}>Automated analysis of your fleet's maintenance readiness. Each finding identifies a specific risk with affected instances, operational impact, and recommended remediation steps.</p>

    {/* Severity summary */}
    <div style={{display:"flex",gap:8,marginBottom:18}}>
      <div style={{flex:1,background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
        <div style={{fontSize:28,fontWeight:800,color:"#991b1b"}}>{criticals.length}</div>
        <div style={{fontSize:10,fontWeight:700,color:"#991b1b",textTransform:"uppercase",letterSpacing:"0.06em"}}>Critical</div>
        <div style={{fontSize:10,color:"#b91c1c",marginTop:2}}>Requires immediate action</div>
      </div>
      <div style={{flex:1,background:"#fffbeb",border:"1.5px solid #fde68a",borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
        <div style={{fontSize:28,fontWeight:800,color:"#92400e"}}>{highs.length}</div>
        <div style={{fontSize:10,fontWeight:700,color:"#92400e",textTransform:"uppercase",letterSpacing:"0.06em"}}>High</div>

        </div>

    {gaps.length===0&&<div style={{background:"#f0fdf4",borderRadius:12,padding:"16px 18px",marginBottom:16,textAlign:"center"}}><div style={{fontSize:15,fontWeight:700,color:"#16a34a"}}>No Resiliency Gaps Detected</div><div style={{fontSize:12,color:"#15803d",marginTop:4}}>Fleet topology and maintenance readiness look good. See the Cost Impact tab for the full strategy reference guide.</div></div>}

      <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"6px 14px",fontSize:11,color:"#5f5956",lineHeight:1.6}}>
        <span style={{fontWeight:700,color:"#d97706"}}>T-0</span><span>Oracle initiates a soft stop with a 5-minute grace period for clean shutdown</span>
        <span style={{fontWeight:700,color:"#d97706"}}>T+5m</span><span>Instance is powered off. Hypervisor firmware update begins on the host</span>
        <span style={{fontWeight:700,color:"#d97706"}}>T+15-20m</span><span>Firmware update completes. Instance is automatically restarted on the same host</span>
        <span style={{fontWeight:700,color:"#d97706"}}>T+20m</span><span>Instance reaches RUNNING state. Applications resume</span>

        <div style={{background:"#f0fdf4",borderRadius:8,padding:"10px 12px",border:"1px solid #86efac"}}>
          <div style={{fontSize:10,fontWeight:800,color:"#166534",marginBottom:4}}>Preserved During Maintenance</div>
          <div style={{fontSize:10,color:"#15803d",lineHeight:1.6}}>Boot volumes and block volumes are preserved. Network config (private IP, public IP, VNIC attachments) is preserved. OCI native block volume backup snapshots are unaffected — they happen at block level. Stopped instances remain stopped — Oracle does not start them.</div>

          <div style={{fontSize:10,color:"#b91c1c",lineHeight:1.6}}>Local NVMe storage on DenseIO shapes (if Stop/Start is used). In-guest backup agents are affected by the instance shutdown. No live migration for this maintenance type. Due Date shown in Console is a bug (60-day default) — only "Scheduled to start" time matters. CanReschedule is set to false.</div>
        </div>
      </div>
    </div>

    {/* Pre-Maintenance Checklist — categorized */}
    <div style={{marginTop:16,background:"#f8f6f4",borderRadius:12,padding:"16px 18px"}}>

      {[
        {cat:"Monitoring & Alerting",color:"#2563eb",items:["Verify OCI Notification Service routes maintenance alerts to your operations team","Enable OCI Monitoring alarms for instance health (500M free datapoints per month)","Configure OCI Events Service rules for instanceMaintenanceEvent state changes","Set up Instance Action Begin/End event rules (filter SOFTSTOP, START) for real-time detection","Enable Compute Instance Health Metrics to detect instance recovery after maintenance","Consider Availability Monitoring to monitor application endpoints during maintenance windows"]},
        {cat:"Availability & Topology",color:"#16a34a",items:["Confirm application-tier instances span 2+ fault domains per availability domain","Check load balancers have active health checks on all backend sets","Scale out workloads into unaffected fault domains before each maintenance wave","Capacity Reservations do NOT protect against OOC during Stop/Start — CR does not tie to a hypervisor"]},
        {cat:"Data Protection",color:"#dc2626",items:["DenseIO: validate NVMe backups before each window — do NOT use Stop/Start","Verify boot volume and block volume backups are current for all scheduled instances","OCI native block volume backups are unaffected (block-level snapshots)","Verify in-guest backup agents handle graceful shutdown — they ARE affected by instance termination"]},
        {cat:"Shape-Specific",color:"#b45309",items:["GPU shapes: do NOT use Stop/Start — extreme OOC capacity risk, instance may be stranded","Bare Metal: self-service update — customer controls timing, no Oracle-initiated reboot","DenseIO: only strategy is Wait + NVMe Backup — Stop/Start destroys local storage"]},
        {cat:"Kubernetes",color:"#7c3aed",items:["OKE nodes: cordon and drain (or kill/replace via autoscaler, or Node Cycling with maxSurge) before each window","Verify cluster autoscaler is enabled if using kill/replace strategy","Confirm PodDisruptionBudgets allow drain operations","Node Cycling: set maximumSurge to 1+, trigger Cycle Nodes in Console or CLI"]},
        {cat:"Support Readiness",color:"#0891b2",items:["Prepare SR template: 'Instance issue after Compute Maintenance' with CN reference (e.g., COMPUTE-100847)","DR failover will NOT avoid maintenance — both regions may be patched concurrently","Due Date in Console is a known bug (60-day default) — only 'Scheduled to start' time matters","PROCESSING status after FD move is a known compute bug — clears to CANCELED"]},
      ].map(({cat,color,items})=>(

        </div>
      ))}
    </div>
  </div>);
}

// ─── Tab: OKE Playbook ───
function TabOKE({okeInstances}){
  const clusters={};okeInstances.forEach(i=>{const c=i.freeformTags?.["oke-cluster"]||i.Compartment_Name||"unknown";if(!clusters[c])clusters[c]=[];clusters[c].push(i);});
  return(<div>
    <div style={{background:"#f5f3ff",border:"1.5px solid #c4b5fd",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:13,color:"#5b21b6",marginBottom:4}}>OKE Node Maintenance Playbook</div>
      <p style={{fontSize:12,color:"#6d28d9",margin:0}}>Three validated strategies for OKE nodes. Pick based on your tolerance for temporary cost vs. control over timing.</p>
    </div>
    {Object.entries(clusters).map(([cn,nodes])=>(<div key={cn} style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:"#5b21b6",marginBottom:4}}>Cluster: {cn} ({nodes.length} node{nodes.length!==1?"s":""})</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{nodes.map(n=><span key={n.ID} style={{fontSize:10,padding:"2px 6px",borderRadius:5,background:"#f5f3ff",border:"1px solid #c4b5fd",color:"#5b21b6",fontWeight:600}}>{n.Display_Name} — {fD(pD(n.Maintenance_UTC))}</span>)}</div>
    </div>))}

    {/* Strategy A */}
    <div style={{border:"1.5px solid #c4b5fd",borderRadius:12,padding:"14px 16px",marginBottom:12,background:"#faf8ff"}}>
      <div style={{fontWeight:800,fontSize:13,color:"#5b21b6",marginBottom:6}}>Strategy A: Cordon + Drain (Wait for Maintenance)</div>
      <p style={{fontSize:11,color:"#6d28d9",margin:"0 0 8px 0"}}>Zero cost. Pods migrate to healthy nodes. Accept the ~20 min node reboot during the scheduled window.</p>
      {[{n:1,t:"Cordon",c:"kubectl cordon <node>",no:"Stops new pod scheduling on this node."},{n:2,t:"Drain",c:"kubectl drain <node> --ignore-daemonsets --delete-emptydir-data --grace-period=120",no:"Evicts pods to healthy nodes."},{n:3,t:"Wait for maintenance",c:null,no:"~20 min reboot. Node rejoins automatically."},{n:4,t:"Uncordon",c:"kubectl uncordon <node>",no:"Re-enables scheduling. Node is on updated firmware."}].map((s,i,a)=><div key={s.n} style={{borderBottom:i<a.length-1?"1px solid #ede8fc":"none"}}><Step n={s.n} title={s.t} cmd={s.c} note={s.no} color="#7c3aed"/></div>)}
    </div>

    {/* Strategy B */}
    <div style={{border:"1.5px solid #f59e0b",borderRadius:12,padding:"14px 16px",marginBottom:12,background:"#fffdf5"}}>
      <div style={{fontWeight:800,fontSize:13,color:"#b45309",marginBottom:6}}>Strategy B: Kill and Replace (Autoscaler) <span style={{fontSize:9,background:"#fef3c7",padding:"2px 6px",borderRadius:4,fontWeight:700,color:"#92400e"}}>FIELD VALIDATED</span></div>
      <p style={{fontSize:11,color:"#92400e",margin:"0 0 8px 0"}}>Terminate the node and let cluster autoscaler provision a replacement on a clean host. Brief over-provisioning cost during ramp. Validated by a customer with 204 VMs.</p>
      {[{n:1,t:"Cordon + Drain",c:"kubectl cordon <node> && kubectl drain <node> --ignore-daemonsets --delete-emptydir-data",no:"Empty the node first."},{n:2,t:"Terminate the node",c:"oci compute instance terminate --instance-id <OCID> --preserve-boot-volume false",no:"Or terminate from Console. Autoscaler detects the missing node."},{n:3,t:"Autoscaler provisions replacement",c:null,no:"New node lands on a patched or not-yet-scheduled host (scheduled hosts are closed for placement). This is safe."},{n:4,t:"Verify cluster health",c:"kubectl get nodes -o wide",no:"Confirm new node is Ready and pods are balanced."}].map((s,i,a)=><div key={s.n} style={{borderBottom:i<a.length-1?"1px solid #fde68a":"none"}}><Step n={s.n} title={s.t} cmd={s.c} note={s.no} color="#d97706"/></div>)}
    </div>

    {/* Strategy C */}
    <div style={{border:"1.5px solid #60a5fa",borderRadius:12,padding:"14px 16px",marginBottom:12,background:"#f8fbff"}}>
      <div style={{fontWeight:800,fontSize:13,color:"#2563eb",marginBottom:6}}>Strategy C: Stop/Start (Move Host on Your Schedule)</div>
      <p style={{fontSize:11,color:"#2563eb",margin:"0 0 8px 0"}}>Cordon, drain, then Stop/Start to move node to a new host. OOC capacity risk applies. Good when you need to control exact timing.</p>
      {[{n:1,t:"Cordon + Drain",c:"kubectl cordon <node> && kubectl drain <node> --ignore-daemonsets --delete-emptydir-data",no:"Empty the node."},{n:2,t:"Stop the instance",c:"oci compute instance action --instance-id <OCID> --action STOP",no:"Wait for STOPPED state. Do NOT use Force Reboot."},{n:3,t:"Start the instance",c:"oci compute instance action --instance-id <OCID> --action START",no:"Lands on a new host. Maintenance event should clear. OOC risk if no capacity."},{n:4,t:"Uncordon",c:"kubectl uncordon <node>",no:"Re-enables scheduling on the now-clean node."}].map((s,i,a)=><div key={s.n} style={{borderBottom:i<a.length-1?"1px solid #bfdbfe":"none"}}><Step n={s.n} title={s.t} cmd={s.c} note={s.no} color="#2563eb"/></div>)}
    </div>

    {/* Strategy D */}
    <div style={{border:"1.5px solid #14b8a6",borderRadius:12,padding:"14px 16px",marginBottom:12,background:"#f0fdfa"}}>
      <div style={{fontWeight:800,fontSize:13,color:"#0f766e",marginBottom:6}}>Strategy D: Node Cycling (maxSurge) <span style={{fontSize:9,background:"#ccfbf1",padding:"2px 6px",borderRadius:4,fontWeight:700,color:"#0f766e"}}>OKE NATIVE</span></div>
      <p style={{fontSize:11,color:"#0f766e",margin:"0 0 8px 0"}}>Use OKE's built-in Node Cycling to replace nodes on clean hosts. OKE spins up a new node first, then cordons, drains, and terminates the old one. Zero downtime. OCI scheduler places the new node on a host not scheduled for maintenance.</p>
      {[{n:1,t:"Configure maxSurge",c:null,no:"Set maximumSurge to 1 or more in your Node Pool settings (Console or CLI). This allows OKE to spin up a new node before terminating the old one."},{n:2,t:"Trigger Node Cycling",c:"# Console: Node Pool → Cycle Nodes\n# Or via OCI CLI",no:"OKE provisions a new node. OCI scheduler places it on a clean host (scheduled hosts are closed for placement)."},{n:3,t:"Automatic drain + terminate",c:null,no:"OKE cordons and drains the old node, migrates pods to the new node, then terminates the old one."},{n:4,t:"Verify cluster health",c:"kubectl get nodes -o wide && kubectl get pods -A | grep -v Running",no:"Confirm new node is Ready, pods are balanced, no pending pods."}].map((s,i,a)=><div key={s.n} style={{borderBottom:i<a.length-1?"1px solid #99f6e4":"none"}}><Step n={s.n} title={s.t} cmd={s.c} note={s.no} color="#0d9488"/></div>)}
    </div>

    <div style={{background:"#fffbeb",border:"1.5px solid #fde68a",borderRadius:10,padding:"12px 14px"}}>
      <div style={{fontWeight:700,fontSize:11,color:"#92400e",marginBottom:4}}>Autoscaler and Instance Pool Behavior</div>
      <p style={{fontSize:11,color:"#78716c",margin:0,lineHeight:1.5}}>Maintenance is NOT a failure event. Autoscaling and instance pools do not trigger a replacement — the pool's current size does not decrease permanently during a reboot, so no replacement is automatically launched. However, for OKE, when a pod on a node is removed during maintenance, the control plane may try to provision it on a new node, which could trigger cluster autoscaling. Use Node Cycling (Strategy D) proactively instead of waiting for this to happen. Hosts scheduled for maintenance are closed for placement — any node provisioned by the autoscaler or moved via Stop/Start will land on a clean host. The new host may still receive a future maintenance notification as the rollout progresses, but this buys time.</p>
    </div>
  </div>);
}

    </div>
